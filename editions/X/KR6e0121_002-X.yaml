body:
  text: 皇龍寺釋表員集緣起義三門同前第一釋名者懍法師云更互相由名之為緣緣無住著一多從緣名之為起大般若經云平等不起故名緣起第二出體者藏曉二師以無礙法界為體懍師云為二為緣起體一不自一緣二故起一二一為一一二為二為緣起體所言一者無有無無一相無相非一為一所言二者非有之有非無之無非有之有以破兔角之無非無之無以破虗空之有破有說無此無非無破無說有此有非有以非有故有而是無以非無故無而是有是有是無名之為二二無二相無二而二也第三問答分別問緣起者其義云何答有數師說一義相師云緣起者隨性無分別即是相即相融顯平等義正順第一義諦體也因緣者隨俗差別即是因緣相望顯無自性義正俗諦體也二隋慧遠師云因緣之義亦名緣起亦名緣集謂假因託緣而有諸法故曰因緣法起藉緣故稱緣起法從緣集故名緣集分別有三一是有為二是無為三是自體言有為者生死之法體有無常生滅所為故名有為從業煩惱因緣而有故名因緣言無為者所謂涅槃體非生滅名曰無為藉道而有故曰因緣此之二法皆從前因集起後果是事緣起言自體者即前生死涅槃之法當法自性皆是緣起其相云何如說生死本性即是如來之藏如來藏中具足一切恒沙佛法而此諸法同一體性互相緣集無有一法獨守自性雖是一性而無不性無一性故諸法皆如無不性故法界門別生死既然涅槃亦爾同體諸法互相集成故曰因緣亦名緣起及與緣起集此自體中復有三種一者有為如來之藏隨妄為染二者無為如來之藏離妄名淨三者自體癈緣論實三懍師云緣起體無二開用為四種一有為緣起二無為緣起三自體緣起四法界緣起謂有不自有緣無起有名有為緣起也無不自無緣有起無名無為緣起也有為無為為二用非有為非無為不二為本體也不二非自不二緣起二不二又自不自自緣他起自又體不自體緣用起體故名自體緣起也無二無不二為平等亦二亦不二為差別差別不自差別緣平等起差別平等不自平等緣差別平等平等不平等皆悉平等名法界緣起問何文為證答離世間品一中有無量無量中有一無障無礙總結云悉是緣起若有一法非緣起者非佛法也又維摩云深入緣起斷諸耶見有無二邊無復習故知不緣起未勉耶見云云四法藏師云問有何因緣令此諸法得有如是混融無礙答因緣無量難可具陳略提十類釋此無礙一緣起相由故二法性融通故三各唯心現故四如幻不實故五大少無定故六無限因生故七果德圓極故八勝通自在故九三昧大用故十難思解脫故初言緣起相由故者餘後九門別處說云云曲有三門一諸緣各異義亦名諸緣互異門即異體也二互遍相資義亦名諸緣互應門即同體也三俱存無礙義亦名應異無礙門即雙辨同異也言諸緣合異義者謂諸緣相望要須體用各別不相和雜方成緣起若不爾者諸緣雜亂失本緣法緣起不成此則諸緣各各守自一也二互遍相資義者謂諸此緣要互相遍應方成緣起且如一緣遍應多緣各與彼多全為一故此一則具多箇一也若此一緣不具多一則資應不遍不成緣起此則一一各具一切一也三俱存無礙義者謂凡是一緣要具前二方成緣起以要住自一方能遍應遍多緣方是一故是故唯一多一自在無礙此上三門總明緣起本法問既聞緣起本法名也未知其義何耶答此上三門中各有三義互相依持初有力無力義由此得相入也二互相形奪有體義由此得相即也三體用融有無義由此即入同時自在也初異門相入者謂諸緣力用遞相依持互形奪故各有全力全無力義緣起方成如十地論云不生緣不生自因生故若各唯有力無無力則有多果過一一各生故若各唯無力無有力如闕一緣一切不成餘亦如是是故一能持多一是有力能攝多多依於一多是無力潛入一由一有力必不得與多有力俱是故無有一而不攝多也由多無力必不得與一無力俱故無有多而不入一也如一持多依既爾多持一依亦然反上思之入多者也如一望多有持依令力無力常含多在己中潛己在多中同時無礙多望於一當知亦爾俱存雙泯二句無礙亦准思之二異體相即義者謂諸緣相望全體形奪有有體無體義緣起方成以若闕一緣餘不成起起不成故緣義則壞得此一緣全一切成起一起成故緣義方立是故一緣是能起多緣及果俱是所起是即多為一成多是無體一能作多一是有體別章云由自若有時他必無故他即是自何以由他無性以自作故由自若空時他必有故自即是他何以故由自無性用他作故又別章云多緣無性為一所成是故多即一一無性為多故成多有一空又疏下文云有一即有一切却一即却一切此即一切是空義故泯自即他以一是有義有義故攝他即自反上來即一是空義故亦泯自即他多是有義故攝他即自來上來四處說文有同有異准思之由一有體必不得與多有體俱多無體必不得與一無體俱一云由一有體能攝多由多無性潛同一故是故無有不多之一無有不一之多一多既爾多一亦然反上思之如一望多有體無體故能攝他同己癈己同他同時無礙多望於一有無體有體亦能癈己同他攝他同己亦無鄣礙亦同他己亦同己他非同他己非同己他二句無礙圓融自在思之可見三體用雙融有無義謂諸緣法要力交出全體融合方成緣起是故圓通亦有六句一以體無不用故舉體全用即唯用而無體但有相入無相即故二以無不用體故全用歸體唯體而無用但有相即無相入也三歸體之用不礙其用全用之體不失其體是故體用不礙雙存即亦入亦即無有鄣礙鎔融自在四全用之體體泯全體之用用三是則體用交徹形奪兩非即非入同源圓融一味五合前四句同一緣起無礙俱存六泯前五句絕待離言冥同性海應可去情如理思攝異體門竟第二同體相入義者謂眾緣之中以於一緣應多緣故各與彼多全為其一是故此一具多箇一然此多一雖由本一應多緣故有此多一然與本一體無差別是故名為同體門也又由此一緣應多緣故有此多一所應多緣既相入即令此多一亦有即入也先明相入謂此本一有力能持彼多箇一故本一中容彼多一多一無力依本一故是故多一入本一中故是即無不容多之本一亦無不入本之多一如本一有力為持多一無力為依容入既爾多一有力為持本一無力無依容入亦爾是即無不容本一之多一無不入多一之本一是即由本一望多一有持有依有力無力故故能容能入無有障礙多一望本一有依有持無力有力故能入能容亦無障礙俱存雙泯二句無礙亦准思之問此與前異體何別答前異體者初一望後九異門相入耳今此同體一中自具十非望前後異門說也同體入門竟二同體相即義者謂前一緣所具多一亦有體無體義故亦相即以多一無體由本成多即一也由本一有體能作一全一攝多如一多有多空既爾多有一空亦爾別章云多一無性為本一成多一舉體即是本一為有體攝多一多一無體融同本一故無不攝多之本一亦無不即本之多一如本一有體多一無體攝即既爾多一有體本一無體攝即亦然是故亦無不攝本一之多亦無不即多之本一是即本一望多一有有體無體故能攝他同己癈己同他無有障礙多一望本一亦體無體攝即可知亦攝不攝亦即無即非攝不攝非即不即二句無礙思之可見同體相即竟三體用俱融即入無礙者亦六句無礙准前思之同體門竟第三同異圓俗義者以此二門同一緣起不相離故若無異體即諸緣雜亂非緣起故若無同體緣不相資亦非緣起故要由不雜方有相資是故若非同體無相異故若非異體無同體故是故通辨亦有四句一或舉體全異具入即俱二或全體是同亦具入即俱以法融通亦全攝故三或俱以同異無礙雙現故四或俱非以相奪俱盡故雙非也又以前諸門總令為一大緣起故致令多種義門同時具足也由住一遍應故有廣狹自在也由就體就用故有相即相入也由一攝多時為顯全一入多為隱多攝亦爾又就用相入為顯全就體相即為隱即顯入隱亦爾又異門相入為顯全同體為隱同顯異隱亦爾又由以異門攝同體中相入義故現微細門也由異體相入帶同體相入故有重重無盡帝網門也別章云異體相容具微細義異體相是具隱顯義同相入故有一多無礙同體相即故有廣狹無礙又由異體攝同故有帝網無礙義上二行注也由此大緣起法即無礙法界法門故有託事顯法門也由此融通自在令依此法上所辨時亦隨法無礙自在故有十世門也由此法門同一緣起相帶起故隨有一門同一緣起相帶起故隨有一門必具一切故主伴門上來總是緣起相由門竟探玄義三門同前第一釋名者義海究深超過情表不可思議故名為玄推欖顯意故名為探有深所以故名為義第二出體者以無礙法界為體慧苑師云二種體事一純淨無漏是德相所依體事二通漏無漏是業用所依體事謂色心時處身方教義行位舉十法通辨前二云云第三問答分別問既言超情豈得可知耶答法藏師云略舉十門攝其綱要謂一同時具足相應門二廣狹自在無礙門三一多相容不同門四諸法相即自在門五隱密顯了俱成門六微細相容安立門七因陀羅網法界門八託事顯法生解門九十世隔法異成門十主伴圓明具德門然此十門同一緣起無礙圓融隨有一門即具一切應可思之就初門中有十義具足一教義具足二理事三境智四行位五因異六依正七體用八人法九逆順十應感具足此上十法同時相應成一緣起無有前後如終等別隨一各具餘一切義參而不雜成緣起際慧苑師云此門為總後九是別二廣狹無礙者以分即無分無分即分無礙自在也如一微塵普周法界而不壞本位也是故或唯廣無礙際或分限歷然或即廣即狹或俱廣狹泯或具前四以是解境故或絕前四以是行境故下皆准此三一多相容門者則此一法舒已遍入一切法中即攝一切令入己內舒攝同時既無障礙此經偈云以一佛土滿十方十方入一亦無餘世界本相亦不壞無比功德故能爾慧苑師云一多相望六句謂一中有一多中有多一中有多多中有一一中有多一多中有一多餘大少等准之四諸法相即門者謂此一事廢己同他舉體全是彼一切法而恒攝他同己全彼一切法即是己體一多相即混無障礙經云初發心菩薩即是佛故由此緣起妙理始終皆齊得如即得終窮終方原始又云在於一地普攝一切諸地功德也是故得一即得一切又云知一即多多即一故也十信終心即作佛者者即其事也如同體一門中即攝一切無盡者為一時俱現耶為前後也答於一門中一時炳然現一切者屬微細門攝隱暎互現重重屬因陀羅攝者餘義即因即異即多即少即有即無即始即終如是自在具足一切無盡法門仍隨舉為首餘即為伴道理一不差失舊來如是問若一門中即具足一切者餘門何用答餘門如虗空何以故同體一門中並攝一切無不盡故問此同體中所攝一切者但應自門中一切豈可攝餘門中一切耶答既攝自一切後攝餘一一門中無餘一切何以故法界緣起無一一切並不成故此但論法界家實德故不可說其邊量此經偈云不可言說諸劫中演說一切不可說不可說劫猶可盡說不可說不可盡又偈云一切眾生心悉可分別知一切剎塵微尚可算其數十方虗空界一毛猶可量菩薩初發心究竟不可測良由一乘法門得一即得一切故因果俱齊無先後別故地論云以信地菩薩乃至與不可思議佛法為一緣起以六相總別等義而用括之明知因果俱時相容相即各攝一切互為主伴深須思之此事不疑又云初發心時便成正覺具足慧身不由他悟云云無量問此等歎因中德耳豈可即果德耶答此一乘義因果同體成一緣起得此即得彼由彼此相即故若果不得者因即不成因何以故不得果故非因也問處處果分不可說但說因分者何故十信終心即辨作佛得果法也答令言作佛者但初從見聞已去至第二生即成佛行終心因位窮滿者於第三生即得彼究竟自在圓融果矣由是因體依果成故但因滿者即沒於果海中也為是證境界故不可說耳此如龍女及普莊嚴童子善財童子兜率天子等於三生中即尅彼果義等廣如經辨問上云一念即作佛者三乘之中已有此義與此何別答三乘望理為一念即作佛今此一乘一念即得具足一切教義理事因果人法等皆悉同時同時十重作佛然此一念與百千劫無有異也宜須思之五隱密顯了門者謂一能攝多則一顯多隱一切攝一則一隱多顯多顯不俱隱隱不並隱顯顯隱同時無礙經云於此方入正受他方三昧起眼根入正受色塵三昧起如第一錢中十錢名為顯了第二錢望第一錢中十即為隱密何以故見此不見彼故不相知故雖不相見然此成即彼成故名俱成也六微細相容門者此上諸義始終同別前後逆順等一切法門於一念中炳然同時齊頭顯現無不明了猶如來箭齊頭現了故經云菩薩於一念中從兜率天降神入胎乃至流通舍利皆悉顯現又云於一塵中微細國土莊嚴清淨曠然安住宜如理思七因陀羅網門者謂此一一微塵之中各皆普現無邊剎海剎海之中復有微塵彼諸塵內復有剎海如是重重不可窮盡非是心識思量所及如帝釋網天珠明徹互相影復現影而無窮盡經云如因陀羅網世界等又云於一微塵中各示那由他無數億諸佛於中而說法智正覺世間於一微塵中現無量佛國須彌金剛圍山世間不迫迮器世間於一微塵中現有三惡道天人阿修羅各各受業報眾生世間又云一切佛剎微塵等爾所佛坐一毛孔皆有無量菩薩眾各為具說普賢行無量剎海處一毛皆坐菩提蓮華座遍滿一切諸法界一切毛孔自在現又云如一微塵所示現一切微塵亦如是云云此等並是實義非變作成此是如理智中如量境也其餘變作等者不入此例何以故此是法性實德法爾如是非分別情謂境界也可去情思之問上云於一塵中現無量剎等者此是一重現而已何成重耶答此方說華嚴時一切塵中亦如是彼微塵中說華嚴時亦云一切塵中亦是說如是展轉重重無盡無盡問若據此文重重無盡有何分齊云何辨其始終等也答隨其智取舉一為首餘即為伴據其首者即名當中餘即眷屬盡窮法界因陀羅成也問此義與上微細云何別耶答齊頭炳然現者微細攝重重隱暎互現因陀羅攝此等諸義並別不同宜細思之八託事顯法門者謂見此事即是見於無盡法界非是託此別有所表經云此華蓋等從無生法忍所起等問三乘之中以有此義與此何別答三乘託異事相表顯異現今此一乘所託之事相即是彼所顯道理更無異也具足一切理事教義無不攝盡者也九十世隔法門者此上諸義遍一切法復該一切時謂三世各三攝為一念故為十世也以時無別體依法以立法既無礙時亦如是經云過去一切劫安置未來今未來劫迴置過去世又云無量劫即一念一念即無量劫等又云或以長劫入短劫短劫入長劫有佛劫入無佛劫無佛劫入有佛劫等云云此上諸義悉於十世自在顯現成緣起故得即入也十主伴圓明門者此圓教法理無孤起必主伴隨生經云此大蓮華有世界海塵數華以為眷屬又云大威光太子晉經普莊嚴童子聞佛說一切法界無垢莊嚴經有世界微塵數修多羅以為眷屬又如一方為主十方為伴餘方亦爾是故主主伴伴各不相見主伴伴主圓明具德然此有二義一同類二異類初同類者如說十住十方各有十剎塵數菩薩來證同名法慧我我等佛所亦說十住大眾眷屬名味句身等無有異是故當知一十住經十方各有十剎塵數修多羅等以為眷屬如一十住餘一切處所說十住皆攝爾許塵數眷屬十住既爾餘十行等一一品會皆有證法數量准釋可知二異類者謂隨一方一界為一類機說一會法既結通十方等說故非主經然亦與主為勝方便故為眷屬是故主經必十方塵道同時同說伴經不爾隨方各別是故一一主經各有塵數眷屬亦古章疏中說諸藏純雜具德門唯心迴轉善成門義門無量不可具陳耳上來所明十門義等者同一緣起無礙圓融隨有一門即具一切應可思之如初既爾餘廣狹等九門皆各具前十時但隨門異耳是故一一門中各有百千等思之可見謂如一事法帶自十義具此十門則為一百餘教義等亦各准之故成千門如教義等望自類十義及同時十門有此千門彼同時等亦望自類十門及教義等亦成千門准思可見普法義三門同前第一釋名者普者溥也謂遍義是普也法自體義軌則義如常說也謂一切法相入相是言相入者曉云謂一切世界入一微塵一微塵入一切世界如一微塵一切亦爾三世諸劫入一剎那一剎那入三世謂劫如一剎那一切亦爾如諸大少促相入餘一切門相入亦爾如說相是亦爾謂一切法及一切門一是一切是一如是廣蕩名為普法第二出體者以無礙法界為體第三問答分別問以何因緣故令此諸法得有如是混融無礙答法藏師云因緣無量難可具提十類釋此無礙一大少無定故二各唯心現故三如幻不實故四無限因生故五勝通自在故六三昧大用故七難思解說故八果德圓極故九緣起相由故十法性融通故元曉師云略而言之有十種因一者一與一切互為鏡影如帝網故二者一與一切更互緣集如錢數故三者皆唯是識如夢境故四者皆非實有如幻事故五者同相異通一切故六者至大至少齊一量故七者法性緣起離性故八者一心法體非一異故九者無礙法界無邊無中故十者法界法爾無障無礙故上來二師各有十門雖繁廣述今取藏師初門曉公第六示其綱要法藏師云謂大非定大故能入少少非定少故能容大十經品云金剛圍山數無量悉能安置一毛端欲知至大有少相菩薩因此初發心解云此中明大非大故有少相也問世界入微塵須彌入芥時既有大少之形而不增少不減大如何得相容耶答空理義云世俗虗假勝義本空迷虗假以礙心小大由隔悟幻化而通意何不相容況乎大少懸著由迷執有達空勝義何礙不通此清辨宗也應理義云略有八釋一執有所執大小懸殊知所執空何少何大二不達依他謂真大少體之虗偽何理不通三事成大少或不能容圓成融通何不相納四執法有用大少乃乖知法因緣同虗豈融五迷心執境實境誰容悟境皆識何誰不得六法真有相大小不容無相為真何大何小七未契真如愚心杳隔知真達偽智洞能通八下位庸心不能通含上人威力何事不能此護法宗也元曉師云一南方說言既稱不思議唯聖境界二乘不測凡豈能解故且置而不釋耳二此主師云大無大相故大得入少少無小相故小得容大三師云大不自大由少故大少不自小由大故小由小故大大名少大由大故少少名大小以少是大少故得容大大是少大故得入少則破第二師立義言既無大相是即無大誰大入小耶小無小相是即無少誰容大耶若言有無相之大無相之小故得容入者今重考之無相之大猶有大而無大耶若言有大即猶有相如其無相即無有大無相有大不應理故四破第三師義言所言小大為大於大小耶為不大於大小耶若言不大者即不名小大以小大同於大小故若言大者即不得入大小於小大以大少少於少大故若言雖大少少於少大大於大少而以不入入故得入者以入不入故不能入以不入入異於入不入故如大小異於少大故大少於少大以不入入故得入少大於大少以入不入故不得入若言以不入入故小大亦入大小者以不大大故小大亦是大少若此不許彼亦不許若皆許者大少雜亂是故當知第三師義亦不得成相入義也既不相入何得相是故今便明相入相是相入之由非一眾多今且出一所謂至大至小齊一量故所有大小皆得相入如華嚴經言欲知至大有小相菩薩因此初發心是義云何言至大者所謂無外如其外非至大故至小亦爾所謂無內設有內者非至小故無外之大所謂大虗無內之小所謂隣虗無內故亦無外外與內必相待故是即至小齊於至大大虗無外故亦無內是即至大同於至小故云至大有小相也若能知如是大少同量即於一切大小皆得無所障礙即是不可思識解脫故言因是初發心也何者須彌雖大而猶小於無外芥子雖小而猶大於無內當知大虗無外入芥子而無遺同於至小故隣虗無內含須彌而有餘同於至大故況乎高座入於方丈須彌入於芥子芥子雖小而猶巨於大虗須彌雖大而猶細於極微今將細極微之須彌入寬大虗之芥子如是相入有何所難但以芥子雖巨大虗而不增其細量須彌雖細極微而不成其高形由是道理不可思議耳是謂大少相入之由相是之緣亦出一種所謂同相異相不相離故何謂異相諸法自相各異故言同相者所謂諸法一相智門謂一切法皆是有有自相故亦皆無無他相故同是是同非皆法皆一等如是同異不相捨離以異不離同故一切是一也同不離異故一是一切也由是道理一與一切無障無礙故能以七日作一劫以一劫作七日云云又說諸法無所障礙如維摩云若須菩提不見佛不聞法彼外道六師是汝之師因其出家彼師所墮汝亦隨墮乃可取食汝得無諍三昧一切眾生亦得是定其施汝者不名福田供養汝者隨三惡道為與眾魔共一手作諸勞侶汝與眾魔及諸塵勞等無有異於一切眾生而有怨心謗諸佛毀於法不入眾數終不得滅度汝若如是乃取食案云此就同相異相不相離門一與一切更互相是故作如是無障礙說非約諦法空無二門所以然者對法空門若告所達不應聞彼懼故餘義如別說也此上諸師義取捨任情發菩提心義三門同前第一釋名者菩提胡語此翻名道果德圓通故曰菩提於大菩提起意趣求名發心也然此發心經名為願要大菩提令來屬己故為願第二出體者懍云緣起之道是菩提心體耳第三問答分別問云何名為發菩提心答遠公云略有三義一者相發心二息相發三者真發初相發者行者深見生死之過涅槃勝利棄捨生死趣向涅槃隨相厭求名相發心言息相者行者深悟諸法平等知其生死本性寂滅涅槃亦如生死寂故無相可厭涅槃如故無相可求返背前相歸心正道故名為發言真發者菩提真性由來己體妄想覆心在之不覺謂之在外向外推求後息妄想契窮自實知菩提性由來己體無異趣求捨彼異求歸心自實故名發心遠公體相如是也又如起信論有三種心一者直心正念真如法故二者深心樂修一切諸善行故三者大悲心救度一切苦眾生故如論廣說問此心因起次第何耶答先就相發以明因起問彼相發心因何而生答遠公云因大悲生問悲因何生答由依信慧問信慧因何答由聞正法問聞法因何答由近善友是故菩薩先近善友由近友故得聞正法問聞何等法答謂聞生死無常大苦涅槃至樂因聞生信信生死苦涅槃大樂因聞生慧知生死苦涅槃大樂由信慧故便發慈悲信知生死是大苦故念生未出故起大悲信知涅槃是至樂故念生未得故起大悲由慈悲故起菩提心悲念眾生於苦未出欲為濟拔自我不出無由化他令出生死是故發心願出生死慈念眾生未得涅槃欲為授與自我不得無由化他令得涅槃是故發心願得涅槃故由慈悲起菩提心次就息相以明因起息相發是修慧攝彼依何生由思慧生思因何生由於聞慧聞慧因何由聞正法聞法因何由近善友是故菩薩先近善友故得聞正法聞何等法謂聞生死涅槃法空如大品等既聞是已便知生死本性寂滅涅槃亦如成就聞慧依聞起思思惟生死涅槃法空依思起修觀諸法空故捨彼相空安心如道名息相發次明真發因起次第真發即是證行所攝彼由何至由於修慧修因何生因思而發思依何起依於聞慧聞由何生由聞正法聞法因何由近善友是故菩薩先近善友由近友故得聞正法聞何等法聞知真實如來藏性是己自體如勝鬘經楞伽經說也既聞是已便成聞慧由聞起思思量真實如來藏性是己自體因思起修觀察修捨妄便證自實以證實故名真發心因起如是問就位論何耶答隨義通論該於始終約位以分別非無差降略要有三廣開為六言要三者如馬鳴說一信發心位在種性此即是前相發心也二解行發心位在解行此即是前息相發也三者證發位在地上此猶前真發心也言廣六者始從外凡終至法雲攝以為六一者外凡隨相趣求名為相發二十信位中真信已成以信趣順名為信發三習種位中真解成就以解趣順名為解發四性種位中真行成就以行趣向名為行發五解行位中以觀道立觀心趣順名為觀發亦名道發六初地已上證行成就證心趣順名為證發懍云問願求無常佛是菩提心不答不也無常到佛地即顛倒迷本不知歸宗也又是謗佛豈開發心耶問作常住果意而求是發心不答非也此求斷無常而得於常便不免著豈成發心耶問云何願成常住佛答常與無常乃至非常非無常寄言為常虗壞如此乃名發心問見生受苦而發心度是發心不答非也但觀生空寂而起悲也問若不見生亦不見可度耶答只無眾生相故可度耳問病情怖可度不答不也病本無法亦無可斷但眾生妄見為有今知妄無一相可得便為還本寄言為度也又有四發心一緣發心仰緣菩提而發心求名緣心未位前也二解發心若解一切法悉是菩提名解發心十解位也三行發心行一切行皆合菩提名行發心十行十向位也四體發心亦名證發心證一切法即是菩提自體顯發名為體發也初地以上至金剛心又智論五種菩提一發心菩提初住位也二伏心菩提從第二住以上三明菩提從初至七地四出到菩提八地至金剛五無上菩提妙覺地也問出體門中緣起之道其義云何答中道圓通心是菩提心體謂不著空不著有不著空有二不著空有不二乃是圓通無礙為無上道心耳問若爾者只上地人能發耳也答凡夫學友中道圓通心乃名發心若不爾非發無等等心也涅槃經云發心畢竟二不別如是二心先心難自未得度先度他是故我禮初發心謂同體本性清淨心也華嚴經云捨離生死出三界等此謂真心體也問行願兩門此心為何耶答大判是願然明出到豈非慧行耶問功德智慧為是何門答他云一向屬功德今判以慧為體而發心功德多故屬功德耳如受持般若為他解說實是智慧而言功德甚多也問此心能伏惑耶亦能斷惑耶答彌勒知識處云此心能斷惑乃至破無明發真明例如金剛定問此心能動無邊生死不耶答此心徹過生死之外即與生死相違已能移之可謂已動例如來出已出家動魔宮問緣力他力何異答緣者值苦樂境他者近師善友問因力自力何異答因力者過去習因自力者現在習果云云實際義三門同前第一釋名者妙絕虗偽名之為實實理本源名之為際故曰實際第二出體者懍云實際以無住為體第三問答問本際先際後際實際此四名何異答隱時名本際顯時名先後二際無隱無顯隱顯不二名實際問本際者但得論隱亦得通顯又得非隱非顯不答亦得通名本際問隱時但得為生死作本際亦得為涅槃作本際答皆得作本本無二也問生死虗偽依實而起本義可爾涅槃未顯若為作本耶答涅槃之性本隱於生死今顯則顯本故知亦為涅槃作本問為涅槃作本義則可解生死虗偽云何以實為本答生死無源正依如來藏而起經云以如來藏故說生說死云死本際問若異體相依則異非偽本也若同體相依則生死之體是異耶答非一非異如波依水起水為波本不可說波異水問生死滅去而本際自留即去留不同云何不異答患息滅法無去留問正以寄患稱本若論法也何本之有答患依法起所以生死之法依實際為本本際八問答竟問云何為先際答生死際滅本隱今顯但始現之初故為先際問為當理有先際為當道理無有耶答道理非隱非顯但據情有本隱而今顯問先際之名若出自情有得道非實隱不答雖名隨情立體即實際問先際之名隨情而立得道先際之心是情不答亦得是真情問真復云何名情答凡真偽隱顯皆非理語問何處入是先際答若據先際而論十信為先際三十心為中際初地至佛地皆後際也若據中際而辨習種初發心為先際從種性至七地為中際從八地至佛地為後際也若據後際而言地前併屬先際可攝唯十地是中際乃至佛地方是後際也問若爾要須三際何得但云先後二際耶答二三皆得亦如前安居後安居亦可說中安居也又經中多明三際即是三世先際無始後際無終中間可知也問一闡提人創入恒河七種眾生是第一人又言三世諸佛皆從恒河第一人來乃至佛果登涅槃山今何故不取闡提作先際也答初分淨心未現故沒其先際之名問若闡提淨心未現不得先際者十信之位一分義未足亦應不得名先際也答一分中之分故得為先際也先際九問答竟問後際云何答本隱今顯顯之窮極說為後際問為取金剛以後說名為後為當自體是後答據時始修生死終盡至金剛後故經說金剛之終為後邊身如來過邊得無邊身也但今明自體終顯名為後際耳問自體無先後但據生死終盡得稱後顯今何故云自體為後耶答乃可由障盡之後而我躬顯然我體有始現之義有終顯之義故以自體後顯為後際也問生死盡處至金剛後可以稱際自體圓顯以何為際答為是生死邊表則是有際失有際則有邊豈得稱常也涅槃圓寂體非彼此而稱彼岸今云後際亦復如是體無前後而說後際問涅槃彼岸亦是時生死之此岸若度生死到涅槃彼岸今亦可謂生死滅後稱為後際答經云以如來不般乃名般所謂非滅度也正是自體畢竟圓寂彼岸涅槃耳問若是圓寂何際之有答正以涅槃之樂果窮極無岸說之為際非有際之際也後際六問答竟問實際有為當形虗稱實為當自體是實答自體是實也非形待也問若不待生死之虗云何名實答經云非實非虗非如非異此所謂理非形待而得自實之名故中論云若法因待成是法還成待諸法實相中無待無非待故知絕待之名問一切眾生一切諸法皆本之實際未審實際體為是一為有眾多答實際之體非一非二若一定是一若二定是二此非實際也問不定之法是實際者不定之旨何得云實答亦非不定亦非定定正以無定之定定無所定名之為實問若答此何有際之可言耶答正以無際為際耳問實際與本際何殊耶答前已云本義通但本唯在本今實際通本末同異成依一切皆實問先際後際與實際何異耶答若二際不二乃稱於實二際無際乃名為際問未審前云涅槃是生死際生死是涅槃際若為是際答有生有滅是生死義不生不滅是涅槃義夫生滅之源不生不滅是其本際也不生不滅亦不定處推其源極唯息生滅是不生不滅之際畔矣然非生滅非不生滅生與不生無二乃為本際無際為際耳問六七識有實際不答六七正以藏識為實際更無實際也問三乘教所明之理亦得是實際不答若局論三乘權教不得有實際但得有空耳問空豈非實耶若此是挊虗之空非真如理實也問欲窮佛法之大海盡其源底者義最深耶答實際義最深問前云生死是涅槃際此豈深耶答涅槃是生死際則深而非遠生死是涅槃際則淺而不近此之生死甚深甚深諸凡二乘所不能達也問若如此實際不定不定非實也答非空非有不離空有亦非中道不離中道亦非生死不離生死亦非涅槃不離涅槃亦非緣起夫實際者無在不在也實際十四問答竟問實際與實性實相法性法位無生無相空如空如若為異耶答實際不變實性性實性不壞諸法名實相實相無相名法性法性理分名法位法位無源名無生無生無所有名無相無相無有無無名空無名空不二不異名如融一切不見同異不見異同也如如義三門同前第一釋名者懍師云如如者諸法之玄宗無二之通旨也如以不異為義萬如一如一如萬如故曰如如夫萬法不異萬如萬如不異萬法一如也萬法不異一如一如不異萬法一如也一非一一不異二二非二二二不異一故曰如如也第二出體門如以不二為體四絕之外絕然後寄假名字目之為無目之為有無有異無無無異有有無不二為如之體有不異無一如也無不異有二如也二如無二為如如體第三問答分別問不二者為遣病耶為顯德耶答遣著即自顯德顯德即自病已問遣何等病耶答有無之病凡夫著有謂有異無聲聞著無謂無異有所以有亦不如無亦不如有之與無悉須遣蕩菩薩如實知有則無有異無如實知無則無有異有也無有異無故不著有也無無異有故不著無也不著有無不異有無有無不異故體如如若假名菩薩謂二異不二異二謂如異不如謂不如異如斯亦不如悉須遣蕩若實義菩薩無二異不二無不二異二亦無如異不如無不如異如是則如如矣若復謂假名異實義謂實義異假名此亦不如悉須遣蕩若無假名異實義無實義異假名假實無二者體如如矣若復謂此如如為理謂此如如為非理若理異非理若非理異理此故不如悉須遣蕩無所不遣也問真如法門中道法界緣起理教等諸名何名耶答不變曰真隨緣稱如不二而二名為法門二而不二名為中道無二不二名為教又總此四句虗通無礙為法門四句無二為中道四句皆絕為理旨無四而四為教詮四不異無四無四無異四為如如此如如皆實相為法界此諸句皆無障礙為緣起若不二而二是有是無是境是智若二而不二無有無無二也無境無智無二也若無二無無二理則絕言何所名哉若無名而名何所而非假名乎若無而亦無有無亦無無有無所以無有無而有無有無而無有無無障無礙故境智等一切法皆亦例此若謂眾生異佛佛異眾生則不如也今反此故曰如如也七八真俗大小經律內外道俗等互相貫通不二不異悉入如如問不善等法為如用耶不答法藏師云二說一云由違真非如用由違真故不離真如如起信云用大者能成一切世間出世間善因果故問若非如用應離如體答以違真故不得離真如人顛倒帶靴為帽倒即是靴故不離靴首帶為帽非靴所用云云問經說如來藏興造一切世間猶如伎兒作種種伎雨等准此染法亦是所造何言非耶答理實染淨俱是所持而得建立但以違順異故不同也如觀施行三事空令施福大等於虗空若觀罪體空則令罪體空則令罪體空則令罪除滅何以不亦令罪廣大是知罪違於如入如則滅善順於真入如則廣故不齊也此上約始終教說一云若隨緣通一切法總是真用具帝網微細重重無盡自在圓融即相不待會即性不待隨此約圓教顯耳
