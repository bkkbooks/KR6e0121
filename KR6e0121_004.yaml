body:
  text: 皇龍寺釋表員集分教義三門同前第一釋名者言分者分齊亦分判義教者教法謂所詮義隨淺深能詮之教亦有差別法藏師云教類有五此就義分非約時事一小乘教二大乘始教亦名初教三終教亦名就教四頓教五圓教亦名至說教同此之別教初小乘可知二始教者以深密經中第二第三時教同許定性二乘俱不成佛故故令合之總為一教此既未盡大法理是故立為大乘始教三終教者定性二乘無性闡提悉當成佛方盡大乘至極之說立為終教然上二教並依化位漸次修成俱名漸教故法鼓經中以空門為始以不空門為終故彼經云迦葉白佛言諸摩訶衍經多說空義佛告迦葉一切空經是有餘說唯有此經是無上說非有餘說此即約空理有餘名始教約如來藏常住無上名為終教四頓教者但一念不生即名為佛不依位地漸次而說故立為頓如思益云得諸法正性者不定一地至於一切地楞伽云初地即八地乃至無所有何次又云漸者如掩摩勒果漸熟非頓頓者如鏡中像頓現非漸此之謂也五圓教者明一位即一切一切位即一位是故十信滿心即攝五位成正覺等依普賢法界帝網重重主伴具足故名圓故如此經等說第二出體者通論教體從淺至深略有十門一言詮辨體門二通攝所詮門三遍該諸法門四緣起唯心門五會緣入實門六理事無礙門七事融相攝門八帝網重重門九海印炳現門十主伴圓備門初中有二先小乘三說云云後大乘中有四句初攝假依實唯聲為體二分假異實以名等為性三假實合辨亦聲亦名等十地論云說者以二事說聽者以二事聞謂音聲名字四假實雙泯非聲非名以即空故維摩云文字性離是即解脫此上四句為一教體是故空有無礙名大乘法謂空不異有有是幻有幻有宛然舉體是空有不異空空是真空真空湛然舉體是有是故空有無毫差別二通攝所詮門者非但能詮亦通所詮如瑜伽八十一云諸契經體略有二種一文二義解云以義依文句得顯故三遍該諸法門者謂一切諸法悉為教體謂有為無為法以無不能全生開覺故如下文華鬘寶地香樹雲閣法界法門無非佛事如勝音菩薩及所坐蓮華即通人法教義行位因果理事總能發生勝解行故並為教體四緣起唯心門者此上一切差別教法無不皆是唯心所現是故俱以唯識為體此上有二義一本影相對二說聽全攝初中四句一唯本無影小乘二亦本亦影如大乘始教衆生心外佛有微妙色聲等如護法論師等三唯影無本如大乘終教離衆生心佛果無有色聲事相功德如龍軍堅慧師等四非本非影如頓教中非直心外無佛色等衆生心內所現之佛亦當相空如龍樹等此前四說總為一教體圓融無礙皆無相妨以各聖教從淺至深攝衆生故二說聽全攝者亦有四句一離心以外無所化衆生況所說教謂諸衆生無別自體攬如來藏以成於衆生然此如來藏即是佛智證為自體離佛心智無一法可得二總在衆生心中以離衆生心無別佛德故謂佛證於衆生心中真如成佛三隨一聖教全唯二心以前二說不相離故謂衆生心內佛為佛心中衆生說法佛心中衆生聽衆生心中佛法如是全收說聽無礙是謂甚深道理四或彼聖教俱非二心以兩俱形奪不並現故雙融二位無不泯故五會緣入實門者亦有二義一以本收末以諸聖教皆從真流如海起潮不失醎味二會相顯性謂彼一切差別教法悉從緣起從緣起故必無自性無自性故即是真如是故虗相本盡真性本現六理事無礙門者亦有二義一謂一切教法舉體真如不礙事相歷然差別二真如舉體為一切法不礙一味湛然平等前則如波即水不礙動相後則如水即波不失濕體七事融相攝門者亦有二義一相在二相是此二門者如常說也八帝網重重門者如常說也九海印炳現門者如前無盡教法皆是如來海印定中同時炳然顯現設所化機亦同緣起是故唯以此三昧海為斯教體如下文云一切示現無有餘海印三昧勢力故十主伴圓備門者謂此普法教不孤起必主伴隨生如普莊嚴童子聞佛說一切法界無垢莊嚴經有世界微塵一修多羅以為眷屬也第三問答料簡問此五教中所說法相如何差別耶答初小乘法有七十五有識唯六所說義理不盡法源多趣異諍如小乘諸部經論說二始教中廣說法相少說真性所立百法決擇分明故無違諍所說八識唯是生滅法相名數多同小乘同非究竟位玄之說如瑜伽雜集等說三終教中小說法相廣說真性以會事從理故所立八識通如來藏隨緣成立具生滅不生滅亦論百法名數不廣又不同小亦無多門如楞伽等經寶性等論說四頓教中不說法相唯辨真性亦無八識差別之相一切所有唯是妄想一切法實唯是絶言呵教勸離毀相泯心生心即妄不生即佛亦無佛不無佛無生無不生如淨名默住顯不二等是其意也五圓教中所說唯是無盡法界性海圓融緣起無礙相即相入如因陀羅網重重無際微細相容主伴無盡十十法門各稱法界如華嚴經說此上五教非局分判經論部帙但隨多分以義而說如上所指通諸經論問立教差別可有無量何故但五不增減耶答約實以論立教多端難以具論且令准理依教務會聖說聊顯其五耳問若有多說者可得聞不答述古今說中略敘二十家勒為六門多依慧苑師四捃餘說第一立一音教自有二家一後魏菩提留支云如來一代說法不離一音故如來一音同時報萬大小並陳是故聖教雖多差別不離一音也二東晉羅什三藏云佛一圓音平等無二無思自應機間自殊非謂言音本陳大小安云兩師俱依本質教說若就影像則非唯一音隨聞者識聚集異故若依無礙法界則說聽圓融合身相攝一多無礙第二立二種教門自有四家一晉朝武兵隱士鄧虬立漸頓二教謂如來一化所說無出漸頓華嚴經等是其頓教餘名為漸漸約五時以顯其相此中妨難煩言多也二隋朝誕法師等亦立漸頓二教與前稍異若約頓機大不由小則名為頓若約漸機大由小起則名為漸教既有憑義復無失若漸降法雨如摩那斯若頓說大法如莊嚴龍三西秦曇牟讖立半滿二教文義全涅槃教義無過四唐初江南印法師等亦立二教一屈曲教謂釋迦經如涅槃等二平道教謂舍那經如華嚴經又此二教略有四異一主異謂釋迦化身與舍那十身異故二處異謂娑婆木樹華藏寶樹異故三衆異謂地前菩薩二乘凡夫十地菩薩衆異故四說異謂局處之說與通方之說異故慧苑師云義寬斷狹多所違犯然今更准之第三立三種教亦有四家一後魏光統律師立漸頓圓三種教謂初為根未熟者先說無常後方說常先為說空後說不空如是漸次故名為漸二為根已熟者於一法門具足演說一切佛法常與無常空不空等更無由漸故名為頓三為於上達分階佛境者說於如來無礙解脫究竟果德圓極祕密自在法門故名為圓其門人遵統亦同此說泛論此說若漸根生熟俱漸頓根生熟俱頓既云未熟名漸已熟名頓此則於一漸根但生熟為異無頓義也又圓機既是分階佛境則地前無有堪聞此經故二玄奘三藏依解深密經立三時法輪教初為發起聲聞乘者於波羅奈國施鹿林中創開生死涅槃因果此即第一四諦法輪次為發趣菩薩乘者鷲峯山等十六會中說諸般若此則第二無相法輪後為發趣一切乘者蓮華藏等淨穢土中說深密等此即第三了義法輪此如測法師解深密記若述此說祇可是漸不可為判一切佛法則衆生界中無頓機故若救言三時約義不據時節者不說初昔今故彼經第二云世尊初於一時在于波羅痆斯國仙人墮處施鹿林中唯為發趣聲聞乘者以四諦相轉正法輪乃至云世尊在昔第二時中唯為發趣修大乘者以隱密相轉正法輪又重重云世尊於今第三時中普為發起一切乘者以顯了相轉正法輪三真諦三藏依金光明經立轉照持三法輪教謂佛成道波羅奈鹿野苑中為聲聞衆轉四諦法輪又於成道第七年中在舍衛國去祇薗五里智慧江邊為諸菩薩及二乘衆說般若等經又於成道三十年後在毗舍離國鬼王法堂為真常菩薩說解節等經此中妨難同前且略言也藏師云真諦立漸頓二教者其違謬也測法師唯識疏中引真諦四教而亦甚謬舛也四唐初吉藏法師立三法輪教一根本法輪教即華嚴經初成道說故二枝末法輪教謂成道五七日後轉四諦法輪故三攝末歸本法輪教謂法華經如來成道三十年後說此說亦違密跡提謂等經第二七日說三乘故是故約時尅教皆不可也第四立四種教門於中自有六家一齊朝大衍法師立四宗教一因緣宗謂經部教三不真宗謂般若教四真宗謂華嚴涅槃若論此說者因緣假名有名濫失何之教內不說此名二陳朝智顗禪師立四教云一三藏教亦名小乘教法華經云不得親近小乘三藏學者二名通教亦名漸教如大品乾慧等十地通三乘者是三名別教亦名頓教聲聞在坐如聾如啞四圓教亦名祕密教此中亦名相濫失與前同之三梁朝光宅寺雲法師立四乘教彼依法華說以臨門三車為三乘權教四衢所授大白牛車為第四實教以臨門三車亦同羊鹿俱不得故若不爾者諸子出宅各應得車無宜更索又三中牛若實者正當元志何說非本所望又不應言初以三車引誘諸子然後但與大車如來亦爾初說三乘引道衆生然以大乘而度脫之依乘立教理極成也四隋朝笈多三藏立四教一四諦教謂四阿含等無相教謂諸部般若三法相教謂楞伽經等四觀行教謂華嚴經測師引此四教為真諦述舛謬失甚恐無順也案此說異四諦之名大乘亦有無相之理楞伽不無雖有法相豈存乎相也何獨華嚴唯明觀行耶五唐新羅元曉法師亦立四教一三乘別教如四諦教緣起經等二三乘通教如般若教深密經等三一乘分教如瓔珞及梵網經等四一乘滿教謂華嚴經普賢教乘共學名三乘教於中未明法空名別相教通說法空是為通教不共二乘名一乘教於中未顯普法名隨分教窮明普法名圓滿教具顯如華嚴疏中六靜法寺慧苑師立為四教初迷真異執教當異生位二真一分半教當二乘人三真一分滿教當初心菩薩四真具分滿教當識如來藏之根器如寶性第四云有四種衆生不識如來藏如生盲人一者凡夫二者聲聞三者辟支佛四者初心菩薩謂有全隱全顯分隱分顯依此以立四教故也案此說者雖依教理猶非別判漸頓二教不可必全依耳第五立五種教門中自有三家一齊朝護身法師立五宗教一因緣宗二假名宗三不真宗此上三教同衍師說四真宗謂涅槃經說佛性常住故五法界宗謂華嚴經說法界門故案此說法者四五兩說但是部別之非通宗之故二唐初波頗三藏亦立五教一四諦教二無相教三觀行教此上三教同笈多說四安樂教謂涅槃經說常樂故五宗護教謂大集經說守護正法事故後之三教亦但可言一部宗也三至相寺舊德亦立五教令正所立也更准之第六立六種教門唯有一家謂耆闍法師云教有六種一因緣宗二假名宗此二同衍說三不真宗謂通說諸法如幻故四真宗謂說諸法真理五常宗謂說恆沙德義六圓宗謂說法界無礙德用故案第三第四二宗但喻法耳法望於喻豈二門也後之二宗亦無過問此上諸說誰是誰非答此上諸德當時法將階位叵測並各依教豈判是非耶是故成實論云佛說內外中間之言遂即入定時五百羅漢各釋是言佛言並非我意諸人問佛既不當佛意將無得罪佛言雖非我意各順正理堪為聖教有福無罪況此諸說各有少多聖教為證是故不可全非棄耳然其中間非無可不知故令略顯違順之相十住義三門分別第一釋名者遠法師云十者數分二五稱之為十行成不退名之為住又復自德相應處所亦名為住即通諸位莫不是住如地持瑜伽中說十三住別則習種初入住分離退之首偏名為住故地持云善起之人數退種性菩薩決定堅固無有退轉住義不同一門說十十名是何一初發心住二治地三修行四生貴五方便具足住新經具足方便住六正心七不退八童真九法王子住新經無法字十灌頂住住分始之於大菩提起意趣求名初發心住善修自利利他之道淨治住處名治地住修護煩惱離小乘行名修行住聖法中生種性尊貴住具足善巧度衆生行名方便具足住得決定智於佛法中雖聞邪說正見不動名正心住雖聞異說正願不動名不退位所行真實離過清淨如世童子無欲無染名童真住於佛法王所行住處出生正智堪住究竟無上菩提名法王子行修上順佛智現前名灌頂住法藏師云若依圓教此灌頂滿即成佛果更無十行等如下海幢比丘處說若三乘教則不如此但是解相未證真故得名有三謂第四八九十從喻為名第七約離過受稱餘並約當體為目第二出體者法藏師云有三義一約所依即以無量方便三昧為體論云此三昧者是法體故二約本即以前種性甚深等為體新經住處廣大三尅性約所緣以真俗二體約能緣以悲智二行又真俗境俱融悲智唯一此二復圓俱融法界無障無礙具德自在是其體也此約圓教辨第三諸門問遠公云住有二分一是修分二是成分其義云何答於諸地前方便造修名為修分德成證實廣大不動名為成分故經說言菩薩種性甚深廣大與法界虗空等成則證實分非可言造修在緣可以言顯故地持云種性粗相我已略說諸餘實義唯佛世尊能決定知藏師云住有二分一果分圓融不可說二因分隨說有二分一約普賢自體行二約普賢位相此有二分一阿含位如此品說二證位如十地說令此正說阿含位問遠公云修分不同略有二種一者同相二別相其義云何答於佛所說一切法中解觀成就名為同相故經中云菩薩隨所聞法即自開解不由他悟一一住中所修各別名為別相發心住中相別有三一發心相緣佛法僧及緣衆生起菩提心二所成相因前發心得十力分從處非處至乃漏盡三所學相十種法令菩提心轉勝堅固成無上道如經廣說治地住中相別有二一利他利於諸衆生發十種心如經廣說二自利行學十種法始從多聞乃至安住亦如經說修行住中相別有二一護煩惱行於一切法十種觀察謂苦無常空無我等二護小乘行於衆生界法界等十種分別生貴住中相別有二一聖法中出生具足行如彼經說聖教中生修十種法一信佛不壞二究竟於法三寂然定意四分別衆生五分別佛剎六分別世界七分別諸業八分別果報九分別生死十分別涅槃十中初一是同教智第二一句是自住處畢竟智第三一句是真如智後七是其分別所說智二上佛法無有厭是學十種法謂於三世諸佛法中能解能修堪能具足即以為九等觀諸佛以為第十方便具足住中相別有二一化衆生行廣有十種謂救衆生饒益安樂一切生等如經廣說有二一生行修學十種知衆生法備如經說正心住中相別有二一決定信雖聞異說於佛法中正信不動二決定知學十種智觀一切法無相無性不可修等不退住中相別有二一不退願雖聞異說於佛法中求心不退廣有十種備如經說二不退智有具十種知一切法亦如經說童真住中相別有二一得勝行於十種法心得安住謂身行淨口行淨意行淨隨物受生知衆生等二淨佛國土於一切佛剎皆悉能知能動能轉能觀能詣能遍至等法王子住中相別有二一化衆生行善解十種化衆生法二求菩提行於法王處學十種智灌頂住中相別有三一度衆生堪能修行成種智能度衆生二得甚深所入境界一切衆生乃至第九法王子菩薩不能測量三者所知廣學十智知一切法十住位中曠備法界一切行德略舉斯耳體相如是問住在何處答有人釋言菩薩十住即是十地所行與彼十地同故問答此十地者何故經言此菩薩種性甚深廣大與法界虗空等經言種性明非十地答今正論之在於習種以習種離退之始故說為住問曰若爾何故所行與十地同答曰地法上下同依依之生信說為賢首依之生解說為十住依之起行說為十行依之以起如實正觀說為回向依之得證說為十地故地經言譬如一切書字數說皆初章為本地如是是一切佛之根本行是能得一切佛法是以所學雖是地法行有習種問此中得十力分等者今既習種豈得漏盡耶答法藏師云分宗可准之一分是因義謂由初發心得成十力果法之因故此約始教辨二分是未圓義謂由入住不退始生佛家得佛體分故謂於十力隨分而得此約終教辨三分圓無礙故得分即得圓但以就普賢門中辨是因而非果故云分也此中於漏盡智亦分得者准教知之又此十力小乘中至佛果始得三乘中地上始分得一乘入位即得故也問此十住何時說耶答經雖不論准依地經應在第二七日宣說問在何處說耶答在忉利天妙勝殿上問何名人說耶答法慧菩薩之所宣說又問入何三昧說耶答法慧菩薩承佛神力入菩薩無量方便三昧問何人加令說住耶答十方各千佛世界外各有千佛世界塵數以同名法慧相與加被問何人證耶答十方各萬佛世界外有十佛世界塵數菩薩同名法慧雲集作證十住之義辨之云爾十行義三門同前第一釋名者十者數名數分二五稱之為十修起名行行別不同一門說十十名是何一歡喜行二饒益行三晉經無恚恨行新經無違逆行四晉經無盡行新經無屈撓行五離癡亂行六善現行七無著行八晉經尊重行新經難得行九善法行十真實行遠公云喜心行施亦令他喜名歡喜行以持淨戒饒益自他名饒益行修忍離瞋名無恚恨行順違皆忍故名無違逆也本業經無瞋恨行也勤修精進廣攝善法名無盡行勤勇離怯故名無屈屈者曲也弱也常修定意遠離愚癡虗妄分別名離癡亂行知法實相般若現前名善現行以無著心起諸所行名無著行成就種種殊勝善根名尊重行深廣行願非易得故名難得也成就種種化他善法行成就第一誠實之語如說能行如行能說名真實行藏師云此十中得名有三謂第八從德立名第三第五第七約離過受稱餘並從能而為目可知第二出體有二先總後別初中藏師三說一約所依以菩薩善思惟三昧為體晉經善伏三昧以依此定證十行體然後說故地論准之二約本行業不可思議等為性三統收約境二諦雙融約行悲智無礙復心境圓融無礙法界具無邊德以為體性二別辨體性各如下文處辨第三問答分別問遠公云行體有二其義云何答一者修分隨緣造習二者成分證實平等廣大不動故經說言是菩薩業廣大如法界究竟如虗空成分即實難以言論修分在緣易以言曉今依修分次第辨釋如下釋之法藏師云行有二分一果分圓性海平等不可說故此中不論二因分約緣隨說有其四重一唯約此位行如仁王經及本業經等說二唯明自體普賢行如下普賢行品說此不依位三以自體行從位而說即如此中長行所說四會攝位相從於自體圓融之行如下偈中說今即後三歡喜行者遠公云布施為體故經說言行歡喜時為大施主悉捨所有等施衆生但行施時生喜有二一生自喜故經說言施已無悔不以煩重而生憂惱倍復歡喜我得善利二生他喜故經說言修歡喜時一切衆生歡喜愛敬藏師云有三一隨相亦三一以無貪善根二彼俱思三兼取三業無表假實通論此三為體此約初教二約性或以真如為性故起信論云知法性體無慳貪隨順修行檀波羅蜜此約終教三約實於施門中所攝無盡圓融法界為性此約圓教餘義如十勝行廣說饒益行者遠公云以戒為體故經說言持戒清淨於色聲等心無染著設有諸魔將諸天女及餘樂具不起惡念但持戒時所益有二一者自益故經說言我持淨戒離一切纏憂悲苦惱成就菩提二者益他故經說言一切衆生未度者度未解者解如是一切藏師云體性三門一隨相門謂於思上假立無表亦有三事一思二無表三身語表業故論云菩薩戒以三業善為體二約本亦以真如為性准之三約實以無盡法界為體餘義云云無瞋根行者遠公云以忍為體故經說言常修忍辱設有無量無數衆生一一各以無數舌無數手毀辱菩薩不生瞋惱藏師云忍有三種一耐怨害忍以無恚善根相應慧數為體緣衆生為境二安受苦忍以精進相應慧數為體緣法為境三法思勝解忍以定慧二數為體緣無法為境以正智入觀境智同如故又通論四法為體初無瞋次勤後慧并思餘門准之若修忍方便者莊嚴論云由三思五想即能忍受三思者一思他毀我是我自業若報即重自造苦不由於他二思彼我俱行苦以彼無知於苦加苦我今有智云何復爾三思聲聞自利尚不以苦加人菩薩利他豈得以苦加物五想者一修本親想一切衆生久來無非親屬故二修法想打罵者不可得故三修無常想衆生性是死法尚不應瞋況加害故四修苦想衆生不離三苦止應令離不應加故五修攝取想本願令樂不令苦故又智論云若彼毀害俱思對治法不應起瞋如遭風雨但求遮法而不瞋之無盡行者遠公云精進為體故經說言勤修精進最勝第一大精進等藏師云以勤思二法為體餘門云云離癡亂行者二師共以定為體故經說云第一正念未曾散亂於一切行一切法中皆無癡亂善現行者遠公云智慧為體於中分別有其二種一順空行成就寂靜身口意業知一切法皆無所有故經說言知一切衆生無性為性一切諸法無為為體一切佛剎無相為相究竟三世皆悉無性如是一切二隨有行故彼經說云亦復不捨菩提之心不捨教化一切衆生增長悲慈如是一切藏師云以別境中慧法為體又唯識論生空慧法空慧俱空慧瑜伽加行正體後得准之無著行者遠公云大方便慧發起勝行以之為體故彼經說以無著心起諸所行無著心者是方便智於有不染於空不住故能起行所起諸行是發起殊勝行也藏師云以後得智悲為體尊重行者遠公云以一切種成就善根為體故經說言菩薩成就尊重善根不壞善根最勝善根不可思議無盡無退無比寂靜乃至一切佛法善根於中分別略有二種一報行成先修令就發起勝曠二集衆行趣向菩提藏師云以大願為行體然是後得智又以信形欲勝解三法為性云云善法行者遠公云以一切種化衆生行為體故經說言為天人等一切衆生作清涼池具一切種陀羅尼門無礙辨才種種音聲種種身等藏師云以後得智大悲無邊智能為體如攝論說真實行者遠公云以所修習諸佛如來一切種德為體故經說言學三世諸佛真實語入三世諸佛性與三世諸佛善根等具佛十力四無畏等如是一切藏師云以後得智用為性兼以大悲等體相差別略述如是問欲何所為耶答遠公云所為有四一為厭有為故修諸行二為求菩提滿足佛德故修諸行三為益衆生欲於現在及未來世救度衆生故修諸行四為求實際為證法如故修諸行故彼經言欲知清淨平等法故修行精進實理諸行皆具此四但經文中有說不說隱現故爾四中前三為求世法後一求理所為如是問何為所依耶答所依有二一依世諦修習諸行二依真諦修習諸行如歡喜中依於施者受者財物修行布施是依世諦不見施者受者財物若業若果如是一切名依真諦歡喜既然諸行復爾問此十行位在何處耶答有人釋云在初地上所行即是十地法也問曰若此是十地者何故經言欲令菩薩種性清淨願種不轉行種不斷以偈頌乎經中既云種性清明非十地答今正論之位在性種以性種中行種建立故名十行問曰經中直云欲令種性清淨云何得知偏在性種答曰文中雖無此判准說因緣過前十住劣後回向及與十地明在性種問曰若此是性種者何故所行與十地同答曰此義前十住中已廣分別十地之法上下同依故此所學雖是地法不妨成行在於性種位分如是問在何時說耶答文雖不辨唯依地經當應亦在第二七日問在何處說耶答在炎摩天宮寶莊嚴殿問何名人說耶答功德林菩薩之所宣說問入何三昧說耶答入菩薩善伏三昧新經菩薩善思惟三昧問何名人加耶答十方各過萬佛世界塵數界外各有萬佛世界塵數諸佛同名功德林相與加被問何人證耶答十方各過十萬佛剎塵數界外各有十萬佛剎塵數菩薩同名功德林雲集作證十行義如是十回向義三門同前第一釋名回己善法有所起向故名回向回向不同一門說十十名是何一救護一切衆生離衆生相回向二不壞回向三等一切佛回向新經等一切諸佛回向四至一切處回向五無盡功德藏回向六晉經隨順一切堅固善根回向新經二處文不同也本分中云入一切平等善根回向釋文中云隨順堅固善根回向七等心隨順一切衆生回向新經無心字八如相回向新經真如相九無縛無著解脫回向十法界無量回向新經入法界無量救護衆生離衆生相者遠公就所回以名菩薩修行六波羅蜜攝取衆生令離一切煩惱業苦安住菩提名救衆生等心救濟不簡怨親善惡等別名離衆生相回此善根有所起向名救衆生相回向不壞者亦就所回以名如經中說於佛菩薩及一切法得不壞信名為不壞等一切佛回向者就所覺為名經言菩薩學過去未來現在諸佛所作回向名等一切佛回向至一切處回向者其所成行益為名如經中說菩薩所修一切善根用心回向力令此善根至一切處譬如實際無所不至名至一切處回向也無盡功德藏回向者就所回向者為名經中說回己所修無盡功德有所趣向名無盡功德藏回向亦得從於所求成以立其名求佛菩薩無盡功德能成無盡功德善根名無盡功德藏回向隨順一切堅固善根回向者從所成彰名回己所修施等善根有所趣向為佛守護法成一切堅固善根名隨順一切等也等心隨順一切衆生回向者就所益彰名菩薩增長一切善根回以等益一切衆生名等心隨順等也如相回向者就所依彰名菩薩所成種種善根同證一切故曰如相亦可此就譬況為名隨一切法以辨真如如義無邊如經廣說所謂性如相如法如等無縛無著解脫回向者就回向心以立名也於一切法心無取執名縛無著於法自在稱曰解脫菩薩不輕一切善法以無縛無著解脫之心回彼善法求普賢行能具普賢一切種德名無縛無著解脫回向法界無量回向者就所求彰名菩薩修習無盡善根回之願求法界差別無量功德名為法界無量回向藏師云一周圓數依則說十回向有三初約理者捨相曰回入理名向二約利生者得利不證曰回大悲隨有救生名向三約菩提者所修善根不願三有二乘名回正趣無上菩提曰向別名中初從所回立名同遠說二約能回行體為名與遠異之三從所學立名通能所回向四通能所說立名亦同亦異五從能回行為名異六亦是能回之行亦同亦異七能所立名亦同亦別八所依為名同九亦能所合目亦同亦異十當法立名異第二出體遠云此十回向大例有三一回向衆生所修善根回施衆生願令出離一切煩惱業苦二回向菩提所修善根求一切智三回向實際所修善根願證實際於一切法不取不捨回向雖衆要不出此藏師云總有三一約所依以明智三昧為體新經智光三昧二以本分中大願為體三具論有六法為性一定二智三願四悲五所依法界六并通慧作用不思解脫等為性別別辨體了隨位顯之第三問答問此十中幾事行幾理行耶答法藏師云有二先別後通別中前七隨事行後三稱理行前中初一悲智不住明行悲本次四明行相於中初一起行心堅二約佛辨廣三約法顯遍四約德顯多下二明行成一智行成二悲行成後三中一正與理合顯體深廣二明依體起無方大用三顯體用無礙圓明自在二通論一一中皆有三種回向謂以善根回向衆生回向菩提回向實際此各二義故回向成且衆生二者一由菩薩善根必依衆生成是衆生之分是故法爾還向衆生二泛既是菩薩必度生是救生具故理須向彼不爾即同二乘自度非是菩薩二菩提二者一菩薩善根依大菩提成從彼流故是彼分故法爾歸彼二泛是菩薩意必為求無上菩提是故善法向大菩提三實際二者一菩薩善根緣成無性依真而成從彼流故是真之物法爾向彼二泛是菩薩必為證真背無明故照二空故問何故須此回向耶答藏師云此三有多義略論十種一約菩提心有三心故起信論云菩提心有三一直心正念真如法故二深心樂修一切諸善行故三大悲心救拔一切苦衆生故二約成菩薩三聚戒故謂律儀離過向實際也攝善廣修向菩提也攝生大悲向衆生也是故法集經云若菩薩捨於三聚回向之心菩薩不應共住三約成二行實際向護煩惱行餘二護二乘行四成二利行向實自利向衆生利他向菩提通二利又釋菩提自利衆生利他實際俱非五為成三德三身由因位三行果成三德向實際成斷德向菩提成智德向衆生成恩德三身如次可知六約成悲智智中照理顯悲分二故有三也七唯約悲謂何故向菩提為衆生故何故為生以彼即真而不知故八約智謂見衆生染相盡故即是實際染相不壞是故為生授以佛智故向菩提九約無礙謂菩提智證同理性衆生染相即真不異是故向一即向三也十約圓明謂三法圓融各攝法界具德自在一切法門相即相入無礙也問此十回向當何位耶答遠公隨義通論回向之心無處不有今此何辨在於解行過前種性劣於十地以此例尋明在解行以解行中鄰於出道故修回向隨順趣入法藏師云此當解行位終第一僧祇滿依佛性論至此位滿方名不退之位瑜伽此中猶自墮地獄中有說此猶屬資糧位以於回向後別說四善根為加行故有說此通二位以於第十回向之中攝加行故有說此總加行以住心已還屬前二善根位滿心已還屬後二善根位故也上總約初教說有說十住初即位不退況至於此又三賢菩薩能遊生佛國況墮惡道又三賢總為趣聖方便不分資糧加行近遠此約終教頓教一切行位俱不可說又准此下文於此位中攝一切具普賢行是故位滿即是因圓此約圓教普賢位說又大回向位有二分一果分當不可說非此所論二因分隨說有四一唯約位相如始終教說瓔珞本業經等辨二唯約自體如普賢大回向行不依諸位三以行體從位門階差說如此下文分回向為十門者是四以位門隨行體圓融說如一一位中攝一切位第十即至究竟法界因圓滿者是今此文中正辨後兼攝前二亦因攝果分准思問何時說耶答遠云文中不辨准依地經當應亦在第二七日問在何處說耶答在兜率天寶莊嚴殿問何人說耶答金剛幢菩薩之所宣說問入何定說耶答入菩薩明智三昧問何人加耶答十方各過百萬佛剎塵數世界外各有百萬佛剎塵數諸佛同名金剛幢相與加被新經十萬准思問何人證耶答十方各過百萬佛剎塵數界外各有百萬佛剎塵數菩薩同名金剛幢雲集作證回向廣難以具論今隨宗要辨之略爾十地義三門分別第一釋名者十者數名數分二五稱之為十地者雖諸論釋不同且依地論四義辨釋一生二成三住四持故彼論言生成佛智住持名地遠公云生之與成望於佛果始起名生終滿曰成亦可望佛為因名生為緣稱成地之一法云何為因而復稱緣據令因時果全未有辨可令有故名為因據彼當果果是可有可有之法地能令現目之為緣亦可地可有證教之別果有性淨方便之果望性淨果證道為因緣望方便果教道為因證道為緣故復就地因說緣所言住者住者當分為言德成之所名之為住所言持者通望因果如以初地望二持地說乃至望佛地望諸後地次第例然地法不同一門說十十名是何一歡喜地二離垢地三發光地晉經論經同名明地四𦦨慧地晉經論經同名炎地五難勝地六現前地七遠行地八不動地九善慧地十法雲地一論云成就無上自利利他行初證聖處多生歡喜故名歡喜地法藏師云有三義一二利創成故二真理初證故三聖住新得故遂本期心多生歡喜遠云經中亦名淨心地也住此地時於真如中證心清淨名淨心地又於三寶得清淨信亦名淨心然此初地對前凡位應名聖地對彼凡夫取我之障應名無我地對前信位應名證地對後修道應名見地如是多義不可並陳且就利益名為歡喜二離能起誤心犯戒煩惱垢清淨戒具足故名離垢地藏師云亦有三義一離煩惱即因離謂能起誤心等二離惡業即果行離謂犯戒等三對治離謂清戒具足也三隨聞思修等照法顯現故名明地解云明即所發光也藏師亦有三義一以此地得四地智慧光明相故如明得定等故下說云彼無行無生慧此名光明二依此地禪發起後地慧光明故大乘光明三昧等三得三慧照法故名明地此約當地加行等釋地論唯就此門四不忘煩惱薪智火能燒故名焰地藏師云此有二義一內證之智焚燒惑薪故名為𦦨即前地聞持明為不忘恃此起慢名為煩惱為是所燒從喻名薪即是解法慢障能燒之智就喻名焰二就後智起用故下論云彼證智法明摩尼寶光中放阿含光明故名炎地遠公亦同此說懍師云不忘煩惱者他云應作忘字謂不忘相也今解不勞治論亦作妄字然有二種一者妄情二妄用何者名妄情若有若無皆是妄相若執為實謂之不妄即詺此不妄為煩惱薪也若知是妄則智能斷之今判此解可在地前也二者除妄情而顯真實用爾時見妄異真見真異妄便以執真不妄為煩惱薪若知非真非妄能真能妄此真如爾炎緣起之智能除執真乖妄之惑故云智火能燒也取捨任情五得出世間智方便善功德能度難度度者至也故名難勝地藏云得出世等釋勝義能度等釋難勝又對前三地得出世難故下論言十平等甚難得故故云得出世間智也對前四地能隨世間難故下論云又現世間最難得故故云方便善巧也即下五地中十平等心及五明處等是後義也此二相違難以相到於此地中能令相到故以為難故云能度難度遠云得出世等也釋其難也能度難度解其勝也六般若波羅蜜有間大智現前故名現前地藏師云此有二義一對後彰劣謂證空實慧名為般若七地已上念念常現今此未能故名有間二對前顯勝自前般若名為大智此智現故名為現前此地就後義立名從前義應名有間地七善修無相行功用究竟能過世間二乘出世間故名遠行地藏師云此亦有二義一此位之中善修行離有相離無相行故云善修無相行此釋行字也二功用究竟等釋遠也於中有三義一有功用行至窮盡最為後邊故云究竟二望前三地隨有之行相同世間今此望彼已為懸遠云能過世間也三望四五六地修習道品諦觀緣起相同二乘出世間位今此過彼故云能過二乘出世間道故名遠行地八報行純熟無間故云不動地藏師云此亦二義一報行純熟故不為功用所動以由修起名為報行成就在此無功任運成諸勝行故云純熟下經釋名中無功用地善起先道等也無相者不為相所動也無間者以無相觀常現前故不為煩惱所動也下經釋名如地不他動故九無礙力說法成就利他行故名善慧地藏師云此亦二義一得四十無礙辨名無礙力此釋慧二功說益生名說法成利他等此釋善此義如下文辨十得大法身具足自在故名法雲地藏師云此亦二義一為法器之身名曰法身然能普周法界故名為大能受諸佛雲雨說法名具足自在二為出法之身名曰法普遍一切名之為大能降注法雨滅塵生善故云自在下釋名分中具廣分釋故云法雲地名義如是第二出體者遠公十地之位無有別體攬行以成成位位之行開合不定或總為一所謂菩薩願善決定以願行主故偏論之或分為二所謂菩薩證教二行或離為三同相三道一證二助三是不住又戒定慧亦得分三或別為四謂聞思修證或說為五謂聞思修執生謂知及與證行又五方便亦得分五謂觀得增上不退盡至或分為六謂六決定又六波羅蜜亦得分六或說為八如彼相續解說經說或說為十信等十行又十度也或分為三十七品復得離為八萬四千諸度法門藏師云十門與遠多同大乘光明三昧為性亦唯約所證真如為性出離真如又唯約能證之智為性法無我智分位亦如如及智為性又一切有為無為功德為性如成唯識論說又約因果如海十相十相喻地一海喻佛大空況果盡喻因分餘門如遠公說懍云二義一出體體二出行體行體復二一是通體二是別體言通體者以三緣三緣緣智為地體其體非一非二亦非不二寄言無十為通體無十而十別體謂初地證智非二地證智地地各有證智言行體所謂證教二道云云第三問答料簡問得名同異何耶答法藏師云有四對一約法喻者或唯就法立名如歡喜等或唯約喻如焰地或法喻合目如法雲地二約體用者如歡喜善慧約體立名所餘就用為目三約無他自義者如離垢不動約無他立名所餘約自義為稱四約當位相形者難勝遠行相形為號所餘約常位立名懍云喜明炎雲借譬為名離垢不動就對治為名難勝遠行功能為名現前善慧就行用為名又歡喜得樂離垢離患此得離為雙明地內明炎地外照此內外雙難勝就勝能行現前無勞易見此難易雙遠行動極不動靜至此動靜雙善慧行力法雲法力此行法雙問歡喜有三種一情喜二定喜三慧喜此是何喜耶答合即慧喜也情中意識所得名喜五識所得名樂定等心內悅名喜喜充遍身為樂今慧中因名喜果名樂緣修則喜樂各體今真修則喜樂同體而推常樂之在佛初心名喜後心名樂四心而言情定之喜在受心中今慧喜者在行心中恬惔無為寄言名喜也八識而言非六七心中正是八心喜也歡喜外發喜悅內怡又喜以對五怖之憂樂以對三苦之總令忘憂喜待寄言名為喜也樂雙忘絶待之樂問論有三種喜一心喜二體喜三根喜其義云何耶答藏師云一心喜者入觀之心心則適悅故二體喜者出觀喜受相應故三根喜者由前心體喜故令所依身色相調暢輕安適悅故問前說慧喜非受何故今說受相應耶答前約入觀今約出觀有何妨中又約實非受而似受耳問二地離垢與等覺無始無明之垢何異耶答二地離十惡破戒垢等覺無無始無明之垢問諸地無不燒惑何故第四獨稱焰耶答藏師二說一就寄位言此地寄當出世間無漏故二以三學寄此地當慧初得故也問懍云本體通體與行體何別耶答行位之本名之為體體不行區分名之為行體問何故以智為地體答論云令入智慧地故處處文非一問何故一真智之體通於十地乃至佛地答經云得十地始終故論云初地入即佛盡入然此之通體一體一切體一地一切地一法門一切法門一行一切行一用一切用故經云住於一地普攝一切諸地功德又海水是一因十山故有十海名菩薩十地同一佛智十障隔故有十地名言別體者地地各有證智初地不知二地境界此顯照用不同明昧有異也如空中跡初跡非後跡跡喻別體空喻通體云云言行體者通而言之證教二道總為地體別而言之證道為體教道為用問同相三道是體不答亦得但論中多明證教以結成故也問別相三道是體不答別相三道是位非體義應云云如法鏡論說問此盡風喻與下鳥跡喻何別答藏師云此中文意以言即不言之教乘彼有即不有之義是故難說難聞況之於說下文鳥跡處直辨所詮十地不可宣示況之於證有此不同也此中唯事有三重一太空喻以所依平等果分二盡風喻以能詮言說之教三盡風位處喻以所說十地因分然此三義有其四句一如空雖平等約風盡遊履非無住處雖有住處以空為體故離相難見此則約風盡而不無就空而不有然此不無即是不有故難說難見也此約十地因分辨耳二就平等果分亦離有無謂如虗空體淨故不無隨風盡有住處故不有也然就此不無即是不有故不可見三約風盡動作故不無不能自現相故不有然就此不無是不有故亦不可見四混前三句謂淨空不有即是風盡及處不無故無說無示不異說示風盡及處不有即是淨空不無故雖如幻說示即是無說無示處空跡喻與前別者太空喻果海與前同也跡處喻地體跡相喻地相鳥足喻言教意不同者前喻地法難說難聞成默不說今喻地法難說難聞誡衆捨著許為宣說此中顯義意者如鳥行空鳥身過後跡處不可說相狀亦不可見然有鳥行不可言無非以有鳥行故令有跡相可取非以無跡相故總無鳥行鳥行喻言教跡相喻地法尋鳥求跡跡不可得尋言求地地不可得但約鳥行十說有十跡實無十跡之異約言分十地實無十地異相是故十地如虗空中十跡豈有差別問如空中鳥已行未行及正行處但無有跡豈可十地言下無所詮義答有所行空處故有所詮義問鳥足空中不能現跡言下既不能顯理何用斯言答鳥行沙土中如足現跡鳥行空中足現無跡小乘言教顯如言義大乘言教顯離言義若無鳥行無以得知虗空無跡故知鳥行能顯無跡非無能詮所況可知問因分可說果分可說果分不可說何義耶答此二分義諸說不同有說能詮之教為因分所詮之義為果分此說甚疏有說地前因行為因分地上證知為果分此品豈說地前法耶故知不然若約諸地加行等為因正證為果亦少分得有說十地有二種門一若約漸增之門名因分十地是則可說有分齊故如月漸增可說差別二若就圓滿時門名果分十地是不可說無分齊故如月滿時無差別故此二十地其體無別但隨分滿假立二分此之未然豈可未至法雲則歡喜可說待十圓滿方不可說若前能起後為因後依前起為果亦少分可然猶非文處有說十地有二種義一者教所安立十地法門在聞者識上似義顯現名為因分此表彼離言義故二者三詮證入十地正行離諸言教所安立相說名果分由彼因分之所表故是故因分可說果分不可說此說少順文意猶非正當今釋有二重一此十地有二分一就實十地唯佛所知佛智所知名為果分論云此智是誰證偈云佛所知故又云智起佛境界故又如分中不思議佛法又如鳥跡所依大空為果海等二隨相十地菩薩所地菩薩所知名為因分是則果分云玄絶當不可說因分隨機是則可說此義通一部經中大意問若爾菩薩證智豈可說耶答教說修中滿足修等是也二云十地有二分一約妙智正證智如鏡故離相言故名果分則不可說如彼鳥跡同於虗空不可說也二約方便寄法顯地差別如下文初二三地寄同世間四五六地同二乘等又寄禪支道品諸諦緣生以顯地別令衆因此表解地義故名因分如空中跡約鳥說異名為因分同空無別名為果分一跡通二故為二分問約鳥約空跡皆離相云何有說有不可說答跡雖離相就鳥就鳥得說得說所說常離也跡同虗空理不可說所況地智准此可知此釋局其地遠公云地位開合不定或一或二乃至說十亦可品類無量別章可見今據一門且論十種此十難分故經與論十門階別其十是何一者趣地地方便不同如地持說菩薩先於解行地中依世俗禪修習一切菩提分法廣興大願轉惡趣報入歡喜地餘方便如地經說修十直心入離垢地修習十種深念之心入第三地起十思量入第四地修十平等深淨之心入第五地修十平等法入第六地十方便慧發起勝行入第七地總前諸地以為方便及修十種無生忍行入第八地修十自利利他之行入第九地總明方便為滿地分入第十地二初住有異歡喜地中菩提心生以為初住第二地中律儀戒淨以為初住第三地中修護煩惱護小乘心方便攝行行以為初住第四地中十種法智教化成就以為初住第五地中成就十種順如道行以為初住第六地中大悲為首大悲增上大悲滿足觀世生滅以為初住第七地中修無量種無功用行以為初住第八地中無生忍淨及得勝行以為初住第九地中得智成就以為初住第十地中三昧滿足以為初住三正住有殊歡喜地中修信精進回向善根以為正住第二地中攝善戒淨及攝衆生方便之行以為正住第三地中修世八禪以為正住第四地中道品行觀以為正住第五地中修不住道以為正住第六地中廣觀因緣以為正住第七地中二行無間以為正住第八地中修淨佛土及十自在以為正住第九地中善知十一稠林之行以為正住第十地中受佛智職以為正住四地果有別歡喜地中起十大願修行十行以為地滿第二地中攝生戒成以為地滿第三地中得四無量五神通等以為地滿第四地中離煩惱業起增上欲報恩精進本心界滿以為地滿第五地中攝德起修化生隨世以為地滿第六地中對治惑鄣修三昧不壞自在以為地滿第七地中業淨三昧過地勝行以為地滿第八地中大勝之行以為地滿第九地中智成口成法師自在以為地滿第十地中智慧解脫三昧總持神通行等以為地滿廣如經說五據修以分初地修願二地修戒三地習定四地修習道品之慧五地修行諦相應慧六地修習緣起之慧第七地中修無量種及功用第八地中修淨佛土第九地中修習說法智行第十地中修習微細智行六就行以別行謂擅等十波羅蜜准之可知七就報顯異初地多作閻浮提王二地作轉輪聖王乃至十地多作摩醯首羅天王八寄數彰別初地得百三昧知佛神力等乃至十地得十不可說百千佛國土微塵三昧等九就喻論差喻別有六謂胎藏練金山地海珠胎藏一喻論家為說後之五經家為譬十對鄣以彰異鄣有十種始從凡夫我相乃至第十於諸法中不得自在鄣廣如論說問何時說耶答佛成道已第二七日即便宣說問在何處說耶答在他化天自在王宮摩尼寶藏殿問何人說耶答是金剛藏菩薩宣說問何人說主耶答謂解脫月菩薩問入何三昧說耶答入大智慧光明三昧亦名大乘光明三昧問何人加耶答十方各過十億佛土微塵數界有十億佛土微塵數佛同名金剛藏相與加被問證人為誰耶答十方各過十億佛土微塵數界有十億佛土微塵數菩薩同名金剛藏雲集作證十地之義辨之云爾
