body:
  text: 皇龍寺釋表員集法界義三門同前第一釋名者法藏師云法有三義一是持自性義二是軌則義三對意義界亦三義一是因義依生聖道故二是性義三是分齊義懍云自體如實名之為法該羅都城名之為界第二出體者懍云以如如為體慧苑師云權小二教中事法以心法及心并不相應能所造色以為其性小乘教理法界以生空所顯無為性權教大乘理法界以二空所顯不變真如而為其性實教大乘理事無礙法界以為無為無二鎔融法界而為其性事事無礙法界以為無為無二常蘊為性若兼顯辨用所依則通有漏五蘊為性元曉師云通論法界不出四句一有為法界二者無為法界三者有為無為法界四者非有為非無為法界法藏師云法界有二先所入法界義有五門初四法界同曉所列釋義不同有耳五無障礙法界二明能入亦有五門一淨信二正解三修行四證得五圓滿云云第三問答分別問懍云凡論體異濫於虗實何耶答以四種簡體一者隨緣法界二對緣法界三忘緣法界四緣起法界前三門中法界體者法界非境智隨緣説境智法界非色心隨緣説色心此隨流處有種種味然種種味皆非本味隨緣有差別差別非法界但有名字下無法隨情而説情非法界故第一隨緣法界中無法界體二對緣者夫著有之病説無以治著無之病説有以治著無之病説有以治常無常等一切例此所對病非是法界能治之藥假名為法若復執此法還復成病病治藥去俱時説淨非但遣治亦復遣遣故對緣中無法界體三忘緣者忘緣忘對故曰忘緣法界也忘有所得忘無所得忘二忘不二亦復忘於忘非但忘名亦忘法界體忘法界用故不立法界體也夫不立者亦法界中一故四緣起法界者前忘緣既無所依著今復忘此緣謂之忘緣忘緣也然後乃立緣起法界義耳一切法如如實相本不生今亦無滅無增無減無有無無而有而無也有是無有也無是有無也無有無二是不二二也無有無無是二不二也亦二亦不二也無二不二也常無常等一切例也今緣起法界中無體而體以如如為法界體也緣起無礙為法界用也無體無用用體體用如如緣起緣起如如問境智節中何故非法界答境之與智亦出妄語之情病情無法問斷得及遣得節中亦究竟被除何名法界答帶病須破之除病不除法問中道節中忘緣既無病何故非法界體答若離虗妄未明緣起法者非法界體體必有用既未論用亦未明體問既非緣起不應入緣起法界中答經云汝應知一切法界莫捨此無分別法此中五節更準鏡論也又緣法界中開為四種一者有為緣集法界二者無為緣起法界三者自體緣集法界四者平等緣集法界若明有則一切有所謂有生有滅有因有果有生死有涅槃有中非中有一相無相有無所有夫有待有對有謂有為法也不生而生不滅而滅滅而非生生義不成今只生滅成故為集也因果相成乃至待對相成為有為緣集無集之集也若明無則一切無所謂無生無滅無因無果無生死無涅槃無中無非中無一相無相乃至無無所有待無對者謂無為法也夫無礙無所有而歷法明無故多體無即為無為法也無無互相成皆入無二法數為無為緣集也若非有為非無為為不二者謂之自體經云法名自體又云自體本來空有不二不盡若歷法明不二則有衆多不二而集為自體緣起也有為無為為二用非有非無即為有無之本體也體不從緣造名為自法自法本來空也若見自體無二不見有為不見無為不無無二謂平等法界只二成無二只無二成二只平等成不平等只不平等成為平等緣集法界中又就平等緣集法界中復開為三種一者法界緣集二者法界無障礙三者法界解脫若此平等無理無教而理而教教理故理集也理教故教集也理教不二故法集也無法無人而法而人人法故法集也法人故人集也人法不二故行集也無行異人法無人法異行故大乘也是為大法界緣集也若無集無散而集而散散集集散乃至生死涅槃涅槃生死有無無有一切無障無礙者法界無障礙也若集不可得散不可得乃至生死不可得涅槃不可得有不可得二不二亦二亦無二無二無無二亦亦不可得無障礙不可得解脫不解脫亦不可得如此絶言只言絶亦不可得不可得謂法界解脫也問夫法有四種謂理法實相法行法教法今云法異者為是何法答夫法異者覩總之名該羅四法也謂理法者無相之空實相者諸法皆如是即諸法相也問經云虗空無相出謂界外法界所不攝以此而言界得云無有一法出於法界答蓋是以相相法為法界以虗空非法相故言出法界外亦非體離法界此總問答問有為緣集攝幾種法答攝四種一色法二心法三無作法四空法問大虗空及三無為既非生苦何故攝屬有為法答三無為者正是事無無必得有相待之假斯名世諦故屬有為攝也問若以假故屬有為法不必有生有滅是有為緣集答若有若無二邊不實若體常住有無理滅離生死滅而是可盡又亦可離故終屬生滅法攝也問性空相空屬何法答亦有為緣集攝問此二是理空中無生滅又非相待假何故屬有為攝答此是無常苦空之空非常住空若有無常法則有此空無常法滅盡空亦隨盡金剛心謝空有俱忘經然空得空此空可斷是以終歸有滅故屬有為法攝也問正取此可斷之法作有為緣集者此法終歸散滅無集為有義答但除其病而不除法故即攝成有為緣集也問有為法皆如之而此人無我空為屬有為為屬無為答屬有為之無為問應身生滅為屬有為為屬無為答此是無生之生無滅之滅屬無為之有為有為八問答例一切竟問何故名無為答不為三相之所為故名無為問常樂我淨法身般若皆是妙有何以故不為為有乃名為無答體無三相故名無為衆德而成故緣集也問既有衆義緣集何謂得稱為無相答皆是不生滅相故名無相故問若攬衆法集成便是假名若是假名即是有為答不生之體體備衆義非假合共成故非假名也問若體備衆義復以誰為而言緣集答正以衆義非一即是衆緣而集也無為五問答竟問自體者若為有為無為作體即是為他作體何故名自體答雖是有為無為依持之本然本有自實故名自體問實之體既非有為復非無為為是何法答是中道一實自性清淨心問染是有為攝淨是無為攝今何故非無為而為淨耶若非無為而得名淨亦得名染不答染淨不攝故得名自性不得名染也問體非染淨不得名染名染者體非有無而得名妙有亦應不得名妙無耶答非有非無不可都無故名妙有非有非無不同無無故名妙無夫染即是著不得名染問有為無為為二自體為一今廢二以顯一為二自亦一自一耶答二而不二不一一是乃名一非形二以論一問此一而無二更有何義得名緣集答一切諸法皆是不二故得名自體緣集經云凡夫謂二智者了達其性無二無二之性即是實性如此衆多皆歸不二法門也自體中六問答竟問法界緣集者為總前三法即是法界為三法之外更有法名法界耶答正總前三法名為法界然總別之殊得言更有法界法起也問據法界而言為猶有前三之別為平等沒三之名答三而常一一而常三亦不存三亦不沒三一三所不易者法界之法也問何故名法答實相故名如論云法名自體問何故名界答有二種一總二別總者該羅都城名之為界如前所説別者諸法各有自相分齊不相和雜如色之與心法自有分齊常無常等亦爾問法界若是總者何故地論云衆生界是總法界等是別耶答衆生與法界各有總別義問何者是衆生總別答攬一切法成大衆生名之為總若言衆生是有情石木等是無情之法此衆生攝法不盡故別也問何者是法界總別答不聞有情無情一切法皆是法界攝名之為總若言法寶非佛僧義此法則別也問十八界攝法界盡不答小乘十八攝分段法界盡攝大乘法界不盡唯有六識界無七八識大乘十八攝法界盡也問諸法界別各不相成何故名緣集答攬諸法總成一大法界故名緣集問緣集與緣起若為取異答集成是緣集義殊能是緣起義問何等人能入法界答入道種入十地證入等覺果入妙覺入體入法界此隨分半等入也別入者十信入始顯於先際未有修入名為等入位也習種入有為界性種入無為界道種入自體界初地已上入平等法界滿足即是佛問何故名入答入者證也得證法相應名之為入問七識緣智能入八識真智能入答緣智起不能入真智乃能入問真智心境不二若為云入答法是本有智是今照照法相應名之為入問若爾境智有二答即法之照義是智與法相應照問若爾只應得道顯於法界不得言入於法界答據觀智言入法界實亦無入相經云一切衆生入真實無所入也據自體正得言顯法界問入義可爾從佛智慧出其義云何答緣起而寂名入寂而緣起名出據法界圓通無出入之異也平等法界緣集十七問答竟上來法鏡論師述之問曉與藏二師四乃五法界同異云何答初有為法界二師同云有二門一本識能持諸法種子名為法界如論云無始時來界等此約同義二三世諸法差別邊際名為法界經云一切諸佛知過去一切法界悉無有餘知未來一切法界悉無有餘知現在一切法界悉無有餘故二無為法界二師同云亦有二問一性淨門謂在几位性恆淨故真空一味無差別故此義出智度論等二離垢門謂由對治方顯淨故隨行淺深分十種故如遍滿等十種法界此義出中邊論等三亦有為亦無為法界者法藏云師亦有二門一隨相門謂受想行蘊及五種色并八無為此十六法唯意識所知故十八界中名法界也十二處門亦名法處此義出對法論也曉公此為第三門二無礙門謂一心法界含有真如生滅二通作有為無為所依於真俗法無所偏黨於一切門無所不通是故説名無礙其猶攝水之波非靜攝波之水非動故經云於無為界出有為界而亦不壞無為之性於有為界出無為界而亦不壞有為之性起信論云不達一法界故心不相應忽然念起名為無明曉公此為第四門此經宗正在此中兼有三前不出此故四非有為非無為者亦有二門自此以後共法藏師述之一形奪門謂緣無不理之緣故非有為理無不緣之理故非無為法體平等形奪雙泯大品三十九云須菩提白佛言是法平等為是有為是無為法佛言非有為法非無為法何以故離有為法無為法不可離無為法有為法不可得須菩提是有為性無為性是二法不合不散此之謂也二無寄門謂此法界離相離性故非此二由離相故非有為離性故非無為又由是真諦故非有為由非安立故非無為又非二名言所能至故是故俱非解深密經第一云一切法者略有二種所謂有為無為是中有為非有為非無為非無為非有為乃至廣説五無障礙法界者亦有二門一普攝門謂於上四門隨一即攝餘一切故是故善財或覩山海或見堂宇皆名入法界二者圓融門謂以理融事故全事無分齊謂微塵非少能容十剎剎海非大潛入塵也以事融理故全理非無分謂一多無礙或云一法界或云諸法界性起品云譬如諸法界分齊不可得一切非一切非見不可取此明諸也舍那品云於此蓮華藏世界之內一一微塵中見一切法界此明一即非一也是故善財或暫時執手遂經多劫或入樓觀普見三千皆此類也上來五門十義總明所入法界應以總別圓融六相準之二能入五門如前已列此五於前所入法界五門之內有其二門一隨一能入通五所入隨一所入遍五能入二此五能入如其次第各入所入五中之一此上心境二義十門無礙圓融總為一圓無障礙法界亦以六相準思之餘門云云慧苑師云廣列衆名云云問前門衆名為為假為實耶答一切皆假法異自體離名言故或此衆名無非是實能成解行有實用故問前明事事無礙法界中何故但依法性融通及三昧等業用以辨而不得緣起相由顯耶答法性融通以理會事事是理事緣起相由從事會理理是事理理事事理唯是一門若離法性融通別説緣起相由當知彼是權小等説何以故無有緣起離法性故問若不許法性融通分別説緣起相由者何故舊云有力無力故有相入義由有體故有相即義耶答此説正是會歸法性謂因緣生法有能所生互望推徵彼此相待力互有無舉體空有云云準之問依異體相即等者色心相望色應緣慮心應質礙以相即故乃至餘法望相皆爾答皆從無生智起淨法界生是故自在還同真性謂全即他而不失自問一即多者其一在不設爾何失二俱有過謂一若在不得有多互相違故一若不在誰即多耶答在何以故一是多一多法體鎔融言即不並故單云一即多當知已説多即一也不爾不是法多一故是故一是多一故即多之時不失一故云在也一是多一更無別一故云不也問相在義中此在彼時此猶在不設爾何失二俱有過謂若不在相義不成彼無此法所以在故若猶在者應有二體在自他故此在彼既爾彼在此亦然答在不所以者何此一切法一恆在一一切恆在一同時互遍而不失本位是故正在他時不失自故在也不失自時自在他故不在也兩義同時俱成故亦在亦不在也互望在不各全收盡翻第三句故非在非不在也問理事無礙中無分限理全在一塵時隨塵少不設爾何失二俱有過謂理若同塵少則理有分限若不同塵少應不全在答理事相望非一非異非一故理在限事全理而非理非異故無限理而全在限有限事而遍無限問無限理性全在一塵時餘塵之內亦在此理不設爾何失二俱有過若餘塵亦有則有多箇理性若言非多總共一理者顯此一中理應非是全若一不全則理可分割若餘塵中無者則理性應不遍彼塵應在法性之外答理性自體非合非散此塵彼塵各無自性即體同理隨而融融相如何謂一塵即是一切塵故理全在一塵時即是全在一切塵中以一切塵即是一塵故理在一切時即是全在一塵之中是故在一在多非合非散一全多全皆無障礙上來八問答顯一義後二法界義也一乘義三門同前第一釋名者一者無他之義因無異趣果無別酬因果相成其體不成名之為一乘者運載之義行能運人所乘故名為乘又一道一切聖人所遊之路更無別岐故名一道道以能通為義乘以能運為功乘動而出出到菩提道靜而通通入涅槃若依此義理非遷動但道無乘行有進趣唯乘乖道又如經説即此法界流轉五道名為衆生返流盡源説名為佛若依此意理非生滅故能隨緣而有運動正當乘義行是生滅無去無來故無遷動直當道名通而言之理中具有道乘之義就離相門本來靜故約離性門隨緣動故行中亦具道乘二義依生滅門無遷動故依相續門有遷動故若依是名如言取義是謂智障諸有所得非乘是即若理若行皆無所得方為聖人所遊所乘聖人所乘無行非理聖人所遊無理非行所以無理無行方為理行無道無乘乃為道乘當知非釋名之為難得意之不易耳設使直爾依名辨義不還破折其名義者是謂結名非釋名也上來元曉師言宜審記知之第二出體略説有三謂性行行果性有二義謂常無常性言性者如來藏理具恆沙性德能與行果而作正因如佛性論説無常常者有二義謂性種性及習種性如瑜伽論説行體者發心已去等覺以還所修萬行以為其體果體者妙覺地中三身菩提以為其體曉云且依法門應作是説盡理而説未必然也何者若理若事若染若淨一切諸法皆是乘體何處有法而非乘耶第三問答問以何得知一切諸法皆是乘體答曉公云如耆婆醫常作是説天下所有莫非是藥菩薩亦爾説一切法莫非菩提又經云淫欲即是道恚癡亦復然如是三事中無量諸佛道若有人分別淫怒癡及道是人去佛遠猶如天與地依此等文故知諸法莫不是道然此等文略有數意一者自性淨心名道諦一切諸法無不性空性空亦是性淨菩提故説諸法莫非菩提二者戒定慧等是名為道戒定慧如淫怒癡如唯一如無二無別故説淫等即是道也三者無分別智是道正體無分別智證真如時三世諸法並現一心無有一法離覺心故説生死與道合也四者法界法爾一切諸法更相涉入如十方三世皆入一塵一塵亦入十方世界一念入無量無量入一念如是諸佛智慧入貪心一念貪心入諸佛慧故説生死與道合五者依無障礙法界法門非但一與一切更相涉入亦乃一法是一切諸法即是一故説淫等即是道也六者至入無自心一切以心為心如來無自身一切身為身所以然者長時無間修無我觀故能得至無自身心三無數劫集無量福故能感得一切自心若存一相為自體者我執不除非謂聖人設有一相不自備者即藥不具不作醫王良由無所得故無所不得乃名圓滿無上正等菩提依此義故説一切法莫非菩提如耆婆説由此聖教及諸道理當知諸法皆是乘體法藏師云一乘為二門一別教二同教初中亦二一是性海果分是當不可説義不與教相應即十佛境界二緣起因分即普賢境界也此二無二全體遍收猶水波思之普賢門中復作二門一分相門二該攝門初中是別教一乘別於三乘如法藏師云門與三車引子得出是三乘教界外露地牛車是一乘也然此一三差別略有十説一權實差別二權一實如常説也問臨門三車為實為不實耶答實不實是方便引故非是實由是方便引子得出非不實耶二教義別臨門三車但有其名經云以佛教門出三界苦故準之三所期別以彼一乘非是界內先許三諸子皆云非本所望故云云四德量別三中牛車但云牛不言餘德露地牛車鈴網衆寶而莊嚴等白牛肥壯大力其疾如風儐從侍衛其數無量非適一準之五寄位別以初二三地寄在世間四地至七地寄出世間八地已上寄出出世間於出世中四五寄聲聞第六寄緣覺七地寄菩薩八地以上寄一乘問若爾何故梁攝論云二乘善名出世不言三乘是出世耶答四五六地是聲聞緣覺八地以去為出出世彼第七是何人也是故當知彼云二乘即大小二乘也以聲聞緣覺俱名小故二乘名通大六付屬別如法華云若善男子善女人信如來智慧者為令得佛慧若不信受者當餘深法中示教利喜謂餘深法者即是大乘非即一乘稱之為餘然非小乘是故稱深亦不可説以彼小乘為餘法法華破小乘豈可歎深耶七根緣受別者如此經云佛子菩薩摩訶薩無量億那由他劫行六波羅蜜修習道品善根未聞此經雖聞不信受持隨順是等猶為假名菩薩解云此明三乘菩薩根未熟故雖如是經爾許劫修行不聞不信此一乘經者新經云設有菩薩於無量百千億那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議大威德法或時聞已不信不解不順不入不得名為真實菩薩問瓔珞經等十千劫修十信滿何故此中無量億等不信此經答以彼但於行布位中修行等於此圓融普賢十信攝一切猶未聞信由此故知二宗差別若不爾者修行既經爾許時劫不信此經何名菩薩摩訶薩也問此等不信是何位菩薩答文無正斷準其劫數十千已過僧祇未滿應是三賢位也問更至何位能信此法答極至此位必定位信入此一乘法終無證地而不信此問何故二乘縱得羅漢亦未信入三乘菩薩不至地上而能信也答以三乘勝故是近方便故不同二乘故也問爾許劫行猶未能信今諸凡夫云何得信答宿有種性聞便信受若不爾者多劫難入今時有人多不信者不足怪也問若彼地前過彼劫數必信受者則知地上二宗不別豈無所信十地耶答於彼教中具有行布十地漸次乃至佛果養彼根器務令成就極遲之者至此劫數當得信入如其疾者則不定可準八難信易信別如賢首品云一切世界群生類鮮有欲求聲聞道求緣覺者轉復小求大乘者甚希有求大乘者猶為易能信是法甚為難解云以此品正明信位終心則攝一切位及成佛等事既超三乘恐難信受故對以決之九約機顯理別如此經第九地初偈云若有衆生下劣其心厭沒者亦以聲聞道令出於衆苦若復有衆生諸根小明利樂於因緣法為説辟支佛若人根明利有大慈悲心饒益於衆生為説菩薩道若有無上心決定樂大事為示於佛身説無盡佛法引晉經文新經準之解云此明一乘法門主伴具故云無盡佛法不同三乘一相一寂等法也是故若入此法則於信滿心具一切位同時而得也問既一位中有一切位及信滿心即得佛者何須更説後諸位耶答後説諸位即是初中一切位也如初後亦爾問若初即具後得初即得後亦可後亦具初故既不得後不得初答實爾但以得初時無不得後故是故無有未得後而不得初也問若等是初門即一切者何不信位心即得而説滿心等耶答若自別教則不依位成今寄三乘終教位相説以彼教中信滿不退方得入位今即寄彼得位之處一時得此一切前後諸位相是故不於信初心説以未得不退故不成位相但是行故問若爾應云住位成佛何名信滿答由信成故是行佛非位佛也問若爾豈説諸位階降次第相耶答以此經中安立諸位有二善巧一約相就分位前後寄同三乘引彼便故是同教也二約體就法前後相入圓融自在異彼三乘是別教故以不移門而恆相即不壞即為恆前後也是故二義融通不相違也如後緣攝門説上來約行作如是説若約位説十住以去云云斷得亦爾若約實一切衆生無不成佛如性起品菩提章説問此中所現衆生成佛為是約理為是約事若是約事何故下云皆悉一性以無性故等若是約理何故云有發心修行等答此是別教中義若不約諸宗分別無由得解何者然諸衆生若於人天位看具足人法二我實物若小乘教中看此衆生唯是一聚五蘊實法本來無人若大乘初教唯識所現如幻以有當相即空無人無法若約終教亦是如來藏緣起舉體即如具恆沙德乃是衆生故不增不減經云衆生即法身法身即衆生衆生法身義一名異解云此宗約衆生即是佛若約頓教衆生相本來盡理性本來顯迸然自露更無所得故不可説即佛等如淨名杜默之意等若圓教即一切衆生並悉舊來發心亦竟修行亦竟成佛亦竟更無新成具足理事因果等十對如此經文問若爾何故理有衆生不即佛耶答汝今就初人天位中人見彼衆生當相即空猶亦不得況復得見圓教中事是汝見現有衆生我不約彼説此成佛但今情見若彼法界圓現一切衆生無不成佛問若爾何故諸佛更化衆生答教化衆生亦有淺深今即此菩提身中現衆生成佛者名究竟教化不同餘宗故下云如來無極大悲度脫衆生也問既總成佛何故亦有發心等耶答若成佛門中總成若修行門總修行若發心門總發心問佛地果德菩提遍在菩薩及諸衆生身心中非是菩薩有菩提果耶答以菩薩心既無自性無自性法即佛菩提故云離等問若爾無自性理即性淨菩提何必要是佛果位法答以佛果大智內契真源融同一性是故如理普遍衆生衆生心中菩提性與果法無有差別則衆生身中有果德菩提非唯因性亦諸教不同若小乘宗總不辨佛性若三乘宗一切衆生位中俱有因性如涅槃云佛性是因而非果若一乘宗亦具果法如此經文問此菩薩心不離如來菩提者似是發菩提心緣菩提為境故云不離何必即是心之自性答若爾衆生既未發心未緣菩提為境不應例觀彼亦有菩提故不約所緣也十本末開合別如大乘同性經云所有聲聞法辟支佛法菩薩法佛法如是一切諸法悉皆流入毗盧舍那智藏大海此文約本末分異仍會末歸本明一乘三乘差別耳此上十證足為龜鏡其別教所明行位因果等相與彼三乘施設分齊全別不同縱無教證依彼義異當須分宗況聖教雲披像蘭滿目矣二該攝門者一切三乘等本來悉是彼一乘法何以故三乘望一乘有二門故謂不異不一初不異中亦二一以三即一故不異二以一乘則三乘故不異問若初門三則一者未知彼三若存若壞若存云何唯一若壞彼三乘機更依何法而得進修答有四句一由即一故不待壞二由即一故不礙存三由即一故無不壞四由即一故無可存由初二義三乘機得在所依由後三義三乘機得入一乘由四句俱即一故是故唯一乘更無餘故二以一乘即三明不異者隱顯四句反上思之是故唯有三乘更無一此如同教中辨二不一者此即一之三與即三之一是非一門也是即不壞不一而明不異又此中不一是上分相門此中不異是此該攝門也三同教者於中二初分諸乘後融本末初中有六重一明一乘中曲有七初約法相交參以明一乘謂如三乘中亦有説因陀羅等而主伴不具亦説華藏而不説十等或一乘中亦有三乘法相謂如十眼中有五眼十通中有六通等而義理皆別此即一乘垂於三乘三乘參於一二約攝方便經云諸有所住皆為一大事故等三約所歸辨謂汝等所行是菩薩道等四就勝界門則以三中大乘為一乘以望別教雖權實有異同是菩薩所乘經云唯此一事實餘二即非真又云止息故説二等此文有二意一若望上別教餘二者即大小二乘也如前引也若望同教即聲聞等為二也五約教事深細如經云我在靈山等六約八義意趣依攝論如問答中辨七約十義方便如孔目中説依諸義即三乘等並名一乘以隨本宗定故主伴不具故是同非別也二明二乘有三種一者一乘二乘名為二乘云云二者大乘小乘名為二乘三者聲聞緣覺為二初約一乘次約三乘後約小乘三者明三乘亦有三種一者一乘三乘小乘名而三乘二者大乘中乘小乘為三乘三者大乘小乘中各有三乘準之四或為四乘一一乘三乘為四二一乘三乘小乘人天為四五或為五乘六無量乘云云二融本末者有其二門一泯權歸實門即一乘也二攬實成權門即三乘也初即不壞權而即泯故三乘即一而不礙三後即不異實而即權故一乘即三而無礙一是故一三融攝體無二也問若爾二共齊如何復説有權實耶答義門別故權實恆在殊理遍通故全體無二何者謂權起必一向賴於實是故攬實不失實實顯未必一向藉於權故泯權權不立是故三乘即一雖具存壞竟必有盡一乘即三雖具隱顯終恆無盡由此鎔融有其四句一或唯一乘謂別教也或唯一或唯三乘如三乘等以不知一故亦一亦三如同教或非一非三如果海又別説者三乘一乘各有二種三乘者一異時三乘如深密經初時唯小第二時大乘二同時三乘如第三時一乘二者一破異明一如法華經二始同終別如般若説三近異遠同如法華説一乘三者一存三之一如深密説二遮三之一如法華等三表體之一如華嚴等上來法藏師述懍師説如法鏡論云云元曉師云所言乘者略説有二謂能乘人及所乘法謂三乘行人四種聲聞乃至元性有情並是能乘人以皆有佛性故教理因果是所乘法問理教及因共運衆生到薩般若此事可爾果理既到究竟之處云何與共運衆生耶答此有數義一者未來世有佛果身冥資衆生令生善心如是展轉重至佛地如涅槃經云以現在世煩惱因緣能斷善根未來佛性力因緣故還生善根故二者當果報佛現諸應化化今衆生令得增進如本業經云自見己身當果諸佛摩頂説法故説衆生乘於果乘果乘能運因地衆生也問開方便門示真實相其義云何答一開示中含有四種義一者用三為一前三乘之教即為一乘教故二者將三致一將彼三乘之人同致一乘果故三者會三歸一會昔所説三乘因果還歸於本一乘理故四者破三立一破彼所執三乘別趣以立同歸一乘義故問用三為一將三致一是二未聞以何為證答法華方便品佛以無數方便演説諸法是法皆為一佛乘故此義正是用三為一之證也又言是諸衆生從佛聞法究竟皆得一切種智此言正是將三致一之證也問會三因果歸本一者為當三皆非異故歸於一實耶為當唯二非實以歸於一實耶若如後者何故經云我有方便力開示三乘法若如前者云何復言唯是事實餘二即非真答或有説者三皆非實如前文説而言一實二非真實者三中之一與無三之一俱是佛乘通説是實餘二不開別言非實由是義故二文不違或有説者唯二非實如後文故説三乘皆方便者於一實中如非實合説為三是非實如人手內實有一果方便言三三非是實無三果故考而論之一果是實二是方便有一果故如智度論云於一佛乘開為三分如人分一斗米以為三聚亦得言合三聚歸一亦得言會三聚有異意不可一會所以然者三乘之教有其二種一者別教二者通教別教三乘三皆非實皆是方便以彼教説三僧祇劫唯修四度百劫之中修相好業最後身中修於定慧菩提樹下成無上覺如是因果以為佛乘是故佛乘亦是方便若論通教所説三乘佛乘是實餘二非真以彼教説於十地中具修六度萬行圓滿到薩波若果不與三世合如是因果究竟真實此為佛乘豈是方便是故當知二文意異我有方便力開示三乘法者是顯別教所説三乘也唯是一事實餘二即非真者是對通教所説三乘其餘諸文皆作是通問若説別教三乘因果皆是方便故歸一者為歸一果答二並亦得經云聲聞緣覺若智若斷皆是菩薩無生法忍皆歸一一因故終到一果彼中説佛乘因果分別佛地化身小分望樹下佛教發心修行故通而言之應作四句一以方便因歸真實因謂菩薩因及二乘因二以方便果歸真實果謂於樹下成無上覺三以方便因歸真實果謂樹下佛前菩薩行四以方便果歸真實因謂二乘人之無學果準之問會三歸一其義已顯破三立一云何可知答略而言之破四種三一執三教定非方便二執三人定是別趣三執三因別感四執三果別趣極破此四種所執之相遣其四種能執之見立一真實謂立一教破三教立一人故別破三人立一因故別破三因立一果故別破三果立一理性通破四三以四一皆同一乘理故凡如前説一乘人法法相常住道理究竟天魔及外道所不能破三世諸佛所不能易以是義故名真實相問非三非一無人無法都無所得如是正觀乃為真實究竟一乘所以然者諸有所得無道無果無動不出故故知前非三是一能乘所乘人法之相不出四句是有所得云何説此為真實相答此説不然所以然者若言非三是一不一不出四句故是所得非究竟者是則有所得為非無得為是亦入四句故是有所得亦非正觀若言寄言説無所得而非如言取於無得是故無得不入四句者他亦寄言假説一乘而非如言取於一乘所以一乘亦出四句是故當知遂言俱非不亦應是實問若不取言皆為實者彼三乘教亦應是實答通義皆許而有別義以三言下都無三理一乘教下不無一理故三是權一乘是實雖不無一而非有一是故亦非有所得也上來開方便門示真實相其如是
