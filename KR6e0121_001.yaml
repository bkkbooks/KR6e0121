body:
  text: 皇龍寺釋表員集七處九會義三門分別第一釋名第二出體第三問答分別第一釋名者七九數名帶數釋也處者居也謂止居之處會者遇也又大計也佳苑云四方郡國録一代之事總而計之名曰會也今案無盡法界大衆集會無邊法界處中故名會也第二出體者法藏師云若小乘者色等四塵并能造四大實色為體若三乘中初教者凡小地前俱以賴耶識為體地上二義報主亦同賴耶為體若二智所現即以唯識智為體若依終教但以如來藏真如為體若一乘以無盡法界通三世間人法理事等諸法為體案今正以後也前小三乘等案為眼自出後門中略也第三問答分別問云何七處何者九會耶答人中三天上四是七處也第二第七第八重會普光明殿為九會晉經八會欠第七重會準也然將欲料簡此義略作三門一辨教義事相二長科本分三辨生起次第初中二義先總後別總者問此經何處説耶答蓮華染淨圓融處説此義後當別出問何時説耶答佛初成道第二七日説謂即此時中攝一切九世十世故是故一時説即一切時説此義亦當後別出問此經是誰説耶答是十佛盧舍那説謂此佛即攝一切佛故是故一説即一切説也此義亦當後出之問為何機説耶答為普賢等海會諸菩薩説以此一海會衆即攝一切海會衆故是故為一海會衆説即為一切海會衆説如下文云云問此經依何定耶答謂依海印三昧以此海印三昧即攝一切三昧故是故依一三昧即是依一切三昧如下文云云問此經説何法耶答謂説華嚴無盡法門海以此華嚴一一皆攝一切法門故説一法即説一切如下文云云此義下當別述也問説幾許經耶答有二種一此界説二十方説此界之中即有三本上本有十三千大千世界微塵數偈四天下微塵數品中本有四十九萬八千八百偈一千二百品此上二本隱在龍宮不出下本有十萬偈三十八品舊常説如此也更後説三十八品又云三十九品也準之又有普眼經以須彌山聚筆四大海水墨書一品修多羅猶不能窮盡如是等品後過塵數此亦但是大菩薩等陀羅尼力之所受持亦非貝葉所能書記以此界所説為總必攝十方所説為眷屬故是故一部即攝一切部即攝一切部今此所有即是十萬偈中唯有四萬五千偈晉經三萬六千偈三十九品八十卷晉經三十四品六十卷亦是五十卷流傳於此上來七問答辨其總竟自下明其別説第一會佛在蓮華藏莊嚴世界海摩竭提國菩提場中與海會菩薩衆俱普賢菩薩承佛神力入一切諸佛毗盧舍那如來藏身三昧晉經如來淨藏三昧説華藏依果威光正因也合六品一十一卷世主妙嚴品第一五卷從第一至第五晉經世間淨眼品明其序分次明正宗如來現相品第二一卷第六普賢三昧品第三世界成就品第四已上兩品共一卷第七華藏世界品第五三卷從第八至第十毗盧遮那品第六一卷第十一晉經此上五品分名盧舍那佛品此五品中初四品明毗盧舍那依果最後一品明佛往因即大威光童子也第二會佛在普光明殿與海會菩薩衆俱文殊師利承佛神力説如來三業及信位法門於中六品四卷佛名號品第七四聖諦品第八已上二品於一卷第十二明覺品第九菩薩問明品第十已上二品共一卷第十三淨行品第十一賢首品第十二已上二品共二卷第十四第十五此六品中初三品明佛三業身語意如次準之後三品辨信行法解行德如次準之又釋初行次願後德第三會佛在忉利天宮妙勝殿上與海會菩薩衆俱法慧菩薩承佛神力入菩薩無量方便三昧説十住等法門於中合六品升須彌頂品第十三須彌頂上偈讚品第十四十住品第十五已上三品共一卷第十六梵行品第十六初發心功德品第十七已上二品共一卷第十七明法品第十八一卷第十八此六品初二品是當會序嚴處集衆後四品中初三品明自分解行德如次準之後一是其勝進趣後方便也第四會佛在夜摩天宮寶莊嚴殿與海會菩薩衆俱功德林菩薩承佛神力入菩薩善思惟三昧晉經菩薩善伏三昧説十行法門於中合四品三卷升夜摩天宮品第十九夜摩天宮中偈讚品第二十十行品第二十一已上三品共二卷第十九第二十十無盡藏品第二十二一卷第二十一此四品中初二品序同前會後二品是當會正宗初一品正位後一品蘊行成就生起後位第五會佛在兜率天宮一切寶莊嚴殿與海會菩薩衆俱金剛幢菩薩承佛神力入菩薩智光三昧晉經菩薩明智三昧説十回向法門於中合三品一十二卷升兜率天宮品第二十三一卷第二十二兜率宮中偈讚品第二十四十回向品第二十五并前品合一十一卷從第二十三至三十三此三品中初二品序同前後一品辨其正宗第六會佛在他化自在天宮摩尼寶藏殿與海會菩薩俱金剛藏菩薩承佛神力入大智慧光明三昧晉論經菩薩大乘光明三昧説十地法門一品六卷十地品第二十六六卷從第三十四至第三十九第七會佛重會在普光明殿與海會菩薩俱普賢菩薩承佛神力入剎那際諸佛三昧説十定等修生本有因果法門於中合一十一品一十三卷十定品第二十七四卷從第四十至第四十三晉經欠此品也十通品第二十八晉經十明品十忍品第二十九已上二品共一卷第四十四阿僧祇品第三十壽量品第三十一晉經壽命品菩薩住處品第三十二已上三品共一卷第四十五佛不思議法品第三十三二卷第四十六第四十七如來十身相海品第三十四隨好光明功德品第三十五晉經小相光明功德品已上二品共一卷第四十八此九品明差別因果亦是修生因果云云普賢行品第三十六一卷第四十五如來出現品第三十七晉經寶王如來性起品三卷從第五十至第五十二此二品明平等因果亦名本有因果云云第八會普光明殿與海會菩薩衆俱普賢菩薩承佛神力入佛華莊嚴三昧晉經脫莊嚴也普慧菩薩二百句問普賢菩薩二千句答説六位行德法門於中一品七卷謂離世間品第三十八七卷從第五十三至第五十九第九會佛在室羅筏國逝多林給孤獨園大莊嚴重閣與海會菩薩衆俱佛自入師子頻申三昧晉經舍衛國祇恆林中乃至奮迅三昧説頓漸入法界法門於中説一品二十一卷入法界品第三十九二十一卷從第六十至第八十問説此經處為淨為穢耶若設爾何失問二俱有過謂若是穢不現寶池寶樹亦不應言爾時華藏世界六種振動若是淨者説九會處何故皆在娑婆人天答慧苑師云華藏娑婆就相説異以相從説性無礙圓融也雖有此説無分明也法藏師云有數四句一染淨四句或染謂摩竭提國七處九會等覆淨相故或淨謂華藏海其地金剛等染相盡故或俱謂華藏內娑婆界染淨存泯隱顯無礙或俱非謂染淨相盡同一法界各相形奪二相盡故二通局四句或局謂此一界或通謂該於十方或俱謂要具前二或俱非謂相盡歸性或局謂此處攝一切剎又此處一一塵等皆攝一切無邊剎海或通謂此界入一切剎又此塵等皆通一切諸剎塵等或俱謂攝入俱現或俱非謂形奪雙泯三依正四句或正在依謂佛在坐等又佛即剎故或依在正謂剎居佛內又剎即佛身故或俱或非並準思之問若如上説則七處九會皆悉雜亂如忉利天説十住時既遍虗空周側毛道未知夜摩等處亦説住不若設爾何失問二俱有過謂若彼不説則説處不遍若彼亦説何故經中唯云忉利説十住法夜摩等處説十行等答此説十住忉利天處既遍十方一切塵道是故夜摩等處皆有忉利即於如是遍夜摩等忉利天處説十住法是故忉利天不普遍仍非夜摩夜摩等處説十行等皆亦遍於忉利等處仍非忉利當知亦爾若約十住與十行等全位相攝則彼此互無各遍法界若約諸位相資則此彼互有同遍法界餘一一品一一處皆亦如是問餘佛説處與舍那説為相見不答設爾何失問二俱有過謂若相見即應相遍若不相見不成主伴答互為主伴通有四句謂主主不相見伴伴亦爾各遍法界彼此互無故無相見主之與伴其必相見伴主亦爾共遍法界此彼互有故無不見如舍那為主證處為伴無有主而不俱伴故舍那與證處同遍法界設於東方證法東處彼有舍那還有東方而來作證如是一一遍周法界一切塵道無障無礙思之可見問以何文證知乎一處即一切處等耶答經云一一微塵中佛國海安住佛雲遍護念彌綸覆一切又云一毛孔中無量佛剎莊嚴清淨曠然安住彼一切處盧舍那佛於衆海中演説正法況七處九會處而不該攝十方法界耶問既在摩竭説彼國衆生有預會不答慧苑師云設爾何失問二俱有過若有預者經何不言耶若無預者何須此説耶答此有二義一為表法二為應機言表法者謂摩竭國是諸國之上道第一會為九會之最初故此説也言應機者會中菩薩除十方新來餘皆隨願生於此國斯即應機何必要列凡俗方是所化之衆云云後二門如別説記説經時義三門同前第一釋名者説者談説謂能説者得陀羅尼於一字中一剎那須能持能説一切法門況一切時中一切字中經者貫穿所説攝持所化如常説也時者説聽究竟之時謂始成正覺時一剎那或無量劫融通無礙具攝一切無不皆攝云云第二出體者慧苑師云若三乘者不相應行蘊所攝若一乘者理事無礙法界以為其性謂一時攝一切前後際盡為時體第三問答分別問此經何時説耶答始成正覺時問始成正覺時未而定説成道已後幾日説耶答別行十地經云成道未久第二七日故知第二七日時也問若爾何故菩提流支云前之五會是佛成道初七日説第六會後是第二七日説耶答法藏師云此解不可十地論云何故不初七日説思惟行因緣行故既云思惟明知非説法問有人説下文中有鶖子等五百聲聞並後時度故知是後時説耶答此所判恐不順文第八會者亦非後時何得於一部經前已説半中説餘經後方更續豈令佛無陀羅尼力不能一念説一切法祇園鶖子並是九世相入相即文云過去一切劫安置未來今未來一劫回置過去世又云於一念中建立三世一切佛事如是等文處處皆有豈可鶖子等而非此類問於此二七之時即攝八九會者是同時耶有前後耶答同時而説有前後也問以何得知是如此耶答如印文讀時前後印紙同時問若爾云何重會得成答重亦同時以無礙故如燈光相入等餘不動升天等準釋可知問若爾諸時相望相攝力齊何要在此不在餘時答此即是餘不時説餘又亦不礙表初之説以不壞相故又非但此二七之時即攝八九會亦為攝彼前後各無量劫無不皆盡以是不思議時故亦攝於重重無量念知如因陀羅網重收攝故問依普耀經第二七日於粗野園為彼五人三轉四諦此小乘依密迹力士經第二七日鹿園為於無量大衆轉法輪時有得羅漢辟支菩薩等是三乘依此經第二七日於樹王下為海會菩薩轉無盡法輪此一乘何故時同而大小殊耶答上三同時者約法表本末同時約人顯機感各異問若爾者何故依法華三七日四分律六七日興起行經七七日依五分律八七日智度論五十七日十二遊經一年方説耶答此並末教機異宜聞各別故致不同本教機定故唯二七問表何義故定二七日耶答十地論云時處等校量顯示勝故此法勝故在於初時及勝處説豈初二會及七八九會所説佛果不如十地苑云世親且依一相故作是説謂四十心中十地為勝六欲天中他化自在為勝非謂一切也藏云此有三義一此經初時表本法勝故二末教亦同表末不離本故三顯本非末故末時不定本時定故問上言如因陀羅網重重無盡時劫常説此經者説華嚴會總天了時何容有此一部經教答有二義一義者為下劣衆生於無盡説中略取此等結集流通故有此部令其見聞方便引入無際限中如觀牖隙見無際虗空當知此中道理亦爾觀此一部見無邊法海二義者又復即此一部是無邊劫海之説以結通文無分齊故一説即是一切説故問若此多劫常恆説者何故如來有涅槃耶答説此經佛本不涅槃入法界品中開旃檀塔見三世佛無涅槃者又復以此初時既攝多劫是故示現涅槃亦在此中以攝化威儀之中涅槃亦是説法攝生與成道説法無差別故是故説法總無休時復舍那佛常在華嚴恆時説法無涅槃故已入大地諸菩薩衆不見如來初説於一切時處恆見如來常説純説如不思議品云云問智論第二云不説迦羅時説三摩耶時其義云何答一迦羅時此云別相時如説或時在衆不得聞等二三摩耶時此云破耶見時不簡白黑一切得聞今言二七之時是後所攝問若爾者二夜經云初成道夜般涅槃夜二夜中間轉正梵輪答由此文義故五臺零辨法師云從初七日至於極終常説恆説云云説經佛義三門同前一釋名者説經二字義如上説佛者慧苑師三説一佛者具言佛陀此翻為覺即圓滿大智照用者也所照是何謂菩提法即真俗無二無障礙法界境也二若依佛地論第一云具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛三依此經宗本始無異之智照法界法無有差別名之為佛經云於一切法成最正覺謂普照境界同一法住始本冥會境智一如名之為佛法藏師云佛陀此云覺者覺有二種一是覺悟義謂理智照真故二是覺察義謂量智鑒俗故者是假人即有覺之者名為覺者有財釋也第二出體者慧苑師云依佛地論五法攝大覺地謂四智及清淨法界若依此經宗具攝無邊無礙法界一切諸法乃至三種世間總攝為體法藏師云若依一乘二種十佛既通三世間即知用一切理事教義因果人法解行等總佛為體若約所依以海印三昧為體第三問答問説此經佛三身之中是何等身耶答法藏師云三説一有人釋云是化身佛以菩提樹下八相成道是化身故不離升天是重化故以釋迦異名名盧舍那非別報身故二有釋云説此經佛是實報身以是盧舍那法界身故居蓮華藏淨土中故下第八會初歎佛具彼二十一種殊勝功德是實報也但以不離化故該此樹下非是化身三釋此佛是十佛之身通三世間以説十信及三賢等地前所見非實報故然居華藏非局化故國土身等非前二故具攝前二性融通故具足主伴如帝網故是故唯是同遍法界十佛之身後説合於經意元曉師又多同説唯一圓滿法身無上如來耳問何故通三世間依正無礙為能説者也答法藏師云有二義一直攝一切三世間盡以具此三事方為佛故三身二身但是三中智正覺攝妙淨土同生之身無不皆是此中所攝二亦正報毛孔依報塵中各重重具攝三世間等一切諸法如帝網現準思之問此佛既在如前無盡時處其佛為是一身為是多身答設爾何失問二俱有過謂若是一何故一切剎中各令現耶若是多身何故經云而不分身耶答此盧舍那法界身雲無障礙故常在此處即他處故遠在他方恆住此故又分圓無礙即此遍法界身一一支分一一毛孔皆亦有自舍那全身是故分處即是圓滿也法界品云如來一毛孔中出一切佛剎微塵等化身雲充滿一切世界不可思議故又此佛身即理即事即一即多即依即正即人即法即此即彼即情即非情即因即果三身即十身無礙自在法界身雲於前時處常説華嚴無休無息又依正無礙謂此身雲即作一切器世間經云或作日月遊虗空或作河池井泉等一切世界海如上説國土身等又潛入無礙於衆生世間無礙自在謂此佛身遍入一切衆生界中如如來藏雖作衆生而不失自性又總攝一切衆生悉在如來一毛孔內一切毛孔亦皆如是經云觀見如來一毛孔一切衆生悉入中普賢亦云一切諸佛及剎土在我身內無障礙我於一切毛孔中現佛境界諦觀察又云佛身充滿諸法界普賢一切衆生前等云云又此一釋迦身隨應群機差別多種或同凡而非聖如見三尺黑象腳身及樹神身等此在人天位或是聖而非凡以同羅漢聖人身故或亦凡亦聖以是父母所生實報身故四大成故同凡身也具五分法身諸漏盡故是聖以表説小乘法故或非凡非聖以是大乘三身攝故非同小乘羅漢聖故或是化非法報以具八相在閻浮故色頂別立彼實報故如梵網經等説此約初教或是報非法化即此身具二十一種殊勝功德如佛地經説此約終教或是法非報化以色即如故經云吾今此身即是法身此約頓教上來約三乘説或亦法報化如前三説故此約同教或非法非報化以是十佛故通三世間故具足主伴如是經下上文説此約圓教是故此佛身圓融無礙極難思也問慧苑云説此經者或佛自説或菩薩説或佛菩薩光明中説或神天等種種類説何故今此唯稱佛耶答説雖多類莫不皆承佛力佛為主故但標佛也故智度論云若不推從佛聞則諍論起故問大師具有十號何故經首唯標佛稱答依真實論佛具十義餘號不爾謂如真諦三藏七事記中引真實論佛具十義謂一覺勝天鼓二不由他悟三離二無智四已過睡眠五譬如蓮華六自性無染七具足三義一假名佛謂六神通二寂靜佛謂或不生三真實佛謂即真也八具足三德般若解脫法身九具三寶性十自知令他知謂自覺覺他也此中餘義如別章廣説六相義三門分別第一釋名者六者數名諸法體狀目之為相謂總相別相同相異相成相壞相法藏師云總相者一含多德故別相者多德非一故別依止總滿彼總故同相者多義不相違同成一總故異相者多義相望各各異故成相者由此諸義緣起成故壞相者諸義各住自法不移動故第二出體者懍法師云通則法界緣起為體別則總相以中道為體別相以二諦為體同相以如如為體異相以萬法為體成相以緣集為體壞相以緣起為體第三問答分別問以何意故辨六相耶答法藏師云破定報見以顯緣起圓融之法此理現前一切惑障一斷一切斷行德一成一切成始終皆齊因果同時等廣説如經問其四句八不等有何差別耶答不自生不他生等四句及不有不無等四句并不生等八不十不等皆悉會事入理以順一寂今此入理圓融彼事使相即相入成普賢法有斯左右耳問何故唯六不多不小耶答泛諸緣起法要有三門一末依於本有起不起謂論云別依本者明依總開別滿彼本者還能成總也二彼所起末既帶於本是故相望有同有異三彼帶本之末既為本收是故當體有存有壞若不具此三不成緣起三中各二故但唯六問緣起法一切處通難窮其趣冀礭陳其相也答法藏師今且略就緣成舍辨問何者是總相答舍是問此但椽等諸緣何者是舍耶答椽即是舍何以故為椽令獨能作舍若離椽舍即令不成故若得椽時即得舍耶問若椽全自獨作舍者未有瓦等亦應作舍答未有瓦等時不是椽故不作非謂是椽而不能作今言能作者但論椽能作不説非椽作何以故椽是因緣由未成舍時無因緣故非是椽也若是椽者其畢令成若不令作不名為椽問若椽等諸緣各出小力作不令作者有何過失答有斷常過若不令成但小力者諸緣各少力此多箇少不成一令舍故是斷也諸緣並少力皆無有令執有令舍者無因有故是常也又若不令成者去却一椽時舍應猶成在舍既令不成故知非小力並令成故問無一椽時豈非舍耶答但是破舍無好舍也故知好舍令屬一椽既屬一椽故知椽即是舍也問既舍即是椽者餘筏瓦等應即是椽耶答總並是椽何以故却椽即無故所以然者若無椽即舍不成舍不成故不名筏瓦等是故筏瓦等即是椽也若不即者舍即不成筏瓦等並皆不成今既並成故故知相即耳一椽既爾餘椽例然是故一切緣起法不成即已成則相容融無礙自在圓極難思出過情外法性緣起一切處準知問第二別相者何耶答椽等諸緣別於總故若不別者總義不成由無別時即無總故此義云何本以別成總由無別故總不成也是故別者即以總為別也問若總即別者應不成總耶答由總即別故是故得成總如椽即是舍故名總相即是椽故名別相若不即舍不是椽若不即椽不是舍總別相即可準思之問若相即者云何説別答只由相即是故成別若不相即者總在別外故非總也別在總外故非別也思之可解問若不別者有何過失耶答有斷常過若無別椽瓦無別椽瓦故不成總舍故是斷也若無別椽瓦等而有總舍者無因有舍故是常也問第三同相者何耶答椽等諸緣和同作舍不相違故皆名舍緣非作餘物故名同相也問此與總相何別耶答總相唯望一舍説今此同相約椽等諸緣雖體各別成舍力義齊故名同相也問若不同者有何過耶答若不同者有斷常過也何者若不同者椽等諸緣互相違背不得作舍舍不得有故是斷也若相違不作舍而執有舍者無因有舍故是常也問第四異相者何耶答椽等諸緣隨自形類相差別故問若異者應不同耶答只由異故所以同耳若不異者椽既丈二瓦應亦爾懷本緣法故即失前齊同成舍義也今既舍成同名緣者當知異也問此與別相何異耶答前別相者但椽等諸緣迭互相望各各異故問若不異者何失答有斷常失也何者若不異者瓦即同椽丈二壞本緣法不成舍故是斷也若壞緣不成舍而執有舍者無因有故是常也問第五成相者何耶答由此諸緣舍義成故由成舍故椽等名緣若不爾者二俱不成今現得成故知成相耳問現見椽等諸緣各住自法本不作舍何因得有舍義成耶答只由椽等諸緣不作故舍義得成所以然若椽作舍去即失本椽法故舍義不得成今由不作故椽等諸緣現在前由此現前故舍義得成矣又若不作舍椽等不名緣今既得緣名明知定作舍也問若不成者何失答有斷常過何者舍本作椽等諸緣成今既並不得有舍故是斷也本以成舍名為椽今既不作舍故即無椽亦是斷若不成者舍無因有故是常也又椽不作舍得椽名者亦是常也問第六壞相者何耶答椽等諸緣各住自法本不作故問現見椽等諸緣作舍成就何故乃説本不作耶答只由不作舍法得成若作舍者不住自法者舍義即不成何以故作者失法舍不成故今既舍成明知不作也問若作者有何失答有斷常二失若言椽作者即失椽法失椽法故舍即無緣不得有故是斷也若失椽法而有舍者無椽有故是常也問約何道理明六相耶答元曉師云此中總別二相標其法界緣起道理以其別緣而起總德同異二相明其緣起相應道理以別無同相不成總故同無異相不成滿故以有別中有同異相乃得相應成一總滿成壞二相顯此緣起離邊道理以成故非無以壞故非有若但成非壞隨增益是唯壞無成隨損減邊今有成壞故離二邊二邊離故即是中道有成有壞亦非一中是謂甚深緣起道理問論云除事事謂陰界入等何耶答藏師云此辨定具義謂約道理説融通非是陰等事相中辨故除簡之上言言説解釋者是定故謂於此中安此六相之言説為欲釋經文應知此意又釋此中釋六相非是此處經文但是論主解釋之意應知謂此文出在下經第四大願初中經家自説非是論主率意而作又此中同相異相者晉經有相無相者以此前類名帶於總名有是同然名互無名無是異故不相違問論云如世界成壞者何義耶答曉云以易顯難如三千界成一世界即成即壞易可了知又説此句舉事喻理謂如世界成時風輪等法次第聚集則有世界世界壞時山海等物次第散滅則無世界十句總別其義相似攬別成總似世界成不可説無開散總作別似世界壞不可説有但世界成壞是事成壞故成時非壞壞時非成六相成壞是理成壞故成即是壞壞即是成但取小分相似為喻別藏師云如百億四天下令成一裟婆界略言標顯為成若分別廣説百億差別令一娑婆無所依住故為壞隋慧遠法師云除事事謂陰界入等彼此相望事別隔礙不具斯六所以除之若攝事相以從體義陰界入等一一之中皆具無量今且就一色陰之中同體具有恆沙佛法謂苦無常空無我等一切佛法是等諸法義別別體同其相緣集以成一色色名為總就此總中開出諸色所謂苦色乃至真實緣起之色如是無量差別之色是名為別苦等法上皆有色義名之為同色義雖同然彼色苦異色無常是名為異義門雖殊其體不別色攝為一是故成成猶也然雖別義門恆異得為多若色目之為壞壞猶廣也拷實論之説前四門辨義應足為約同異成前二門故有六也此乃大乘之淵圓通之妙門懍法師諸門廣述繁言故略之藏法師乃為頌曰一即具多名總相多即非一是別相多類自同成於總各體別異顯於同一多緣起理妙成壞性自法常不作唯智境界非事識以此方便會一乘數十錢喻義三門分別第一釋名者數者數量也以一名十等也一者數名依一周圓類以表十也欲表無盡故錢者財也謂開元寶等也喻者比也類也况法相似是喻義也第二出體者以無障無礙緣起法界為體第三問答問欲顯何義以數錢喻耶答法藏師云欲表大緣起陀羅尼法故義相師云欲示緣起實相陀羅尼法元曉師云詮普法義故此中有二一者異體二同體就初中有二一相入二相即所以有此二門者以諸緣起皆有二義故一有力無力義此望力用二有體無體義望此自體由初義故得相入由後義故得相即初中自有全力所以能攝他他全無力故所以能入他有力自無力反上可知不據自體故非相即力用交徹故成相入又由二力二無力各不俱故無彼不相入有力無力無力有力無二故是故常相入二空有中由自若有時他必無故他即自何以故由他無性以自作故二由自若空時他必是有故自即他何以故由自無性用他作故一云若鬪一緣餘不成起起不成故緣義則壞得此一緣全一切成起一起成故緣義方立是故一緣是能起多緣及果俱是所起是即多為一成多是無體一能作多一是有體然此義後更説也以二有二空各不俱故無彼不相即有無無有無二故是故常相即又以體收用無別用故唯是相即若不爾者緣起不成有自性等過見之可思於中光明相入此中有二門一向上去二向下來向上去中亦有十門一者一是本數何以故緣成故乃至十者一中十何以故若無一即十不成故則一有全力故攝於十也仍十非一辨餘九門亦如是一一皆有十準例可知義相師云中門中向上來向下去即門中向上去向下來前後言錯故不用也向十數中亦十門一者十何以故緣成故乃至十者十中一謂若無十則一不成故則一無全力歸於十也仍一非十矣餘例然如是本末二門中具足十門餘一一錢中準以思之此中數數法者一者十二者十中九乃至十者十中一此約異門相望説耳問既言一者何得一中有十耶答大緣起陀羅尼法若無一即一切不成故定知如是此義云何所言一者非自性一緣成故是故一中有十者是緣成一若不爾者自性無緣不得名一也是故一切緣起皆非自性何以故隨去一緣即一切成是故一中則具多方名緣起一耳問若去一緣而不成者此即無性無自性者云何得成一多緣起答由只無性得成一多緣起何以故由此緣起是法界家實德故普賢境界具德自在無障礙故華嚴云菩薩善觀緣起法於一法中解衆多衆多法中解一法是故當知一中十十中一相容無礙仍不相是一門中既具足十義故知一門中皆有無盡義餘門亦如是問一門中攝十盡不盡答盡不盡何以故一中十故盡十中一故不盡四句護過去非顯德等準之可解耳別別諸門中準例如是緣起妙理應如是知第一門竟初異體門中第二即義者此中有二門一者向上去二者向下來初門中有十門一者一何以故緣成故乃至十者一即十何以故若無一即無十故由一有體餘皆空故此一即是十矣如是向上乃至第十皆各如前準可知耳言向下者亦有十門一者十何以故緣成故乃至十者十即一何以故若無十即無一故由一無體是餘有故是故此十即是一矣如是向下乃至第一皆各如前準可知耳以此義故當知一一錢即是多錢耳問若一不即十者有何過失答若不即有二失一不成十錢過何以故若一不即十者多一亦不成十何以故一一皆非十故今既得成十明知一即是十也二一不成過何以故若一不即十十即不得成由十不成故一義亦不成何以故若無十是誰一故今既得一明知一即十又若不相即緣起門中空有二義即不現前便成大過謂自性等思之可知問若一即十者應當非是一若十即一者應當非是十答只為一即是十故是故名為一何以故所言一者非是所謂一緣成無性一為此一即多者是名一若不爾者不名一何以故由無自性故無緣不成一也十即一者準前例取勿妄執矣應準知之問上一多義門為一時俱圓耶為前後不同耶答即圓即前後何以故由此法性緣起具足逆順同體不違德用自在無障礙故皆得如是問如上所説去來義其相云何答自位不動而恆去來何以故去來不動即一物故但為生智顯理故説去來等義耳若廢智一切不可説如上果分者即其事也問若由智者即非先有云何説言舊來如此答若廢智即不論緣起由約智故即説舊來如此何以故不成即已成即離始終故智及與法舊來成故問為由智耶為法如是耶答為由智耶為法如是耶何以故同時具足故餘義準以思之大段異體門説第二同體門中亦有二義一者一中多多中一二者一即多多即一初門中二一者一中多二者多中一初一中多者十門不同一者一何以故緣成故是本數一中具十何以故由此二錢自體是一復與二作一故即為二一乃至與十作一故一切即為十一是故此一之中即自具有十箇一耳仍一非十也以未是即門故初一錢既爾餘二三四已上九門中皆各如是準例可知耳二者多中一亦有十門一者十何以故緣成故十中一何以故由此一與十作一故即彼初一在十一之中以離十一即無初一故是故此一即十之中一也仍十非一矣餘下九八七乃至於一皆各如是準例思之問此與前異體何別耶答前異體者初一望後異門説也二者即義中一即十十即一亦有二門一者一即十亦有十門不同一者一何以故緣成故一即十何以故由此十即是初一故無別自體故是故此十即是一也餘九門皆亦如是準之可知二者十即一者亦十門不同一者十何以故緣成故十即一何以故以彼初一即是十故更無自一故是故初一即是十也餘九門準例知之問此同體中一即十等者為只攝此十耶為攝無人盡耶答此並隨智而成須十即十須無盡即無盡如是增減隨智取矣即十如前釋言無盡者一門中既有十然此十復自迭相即入重重成無盡也然此無盡重重皆悉攝在初門中也問但攝自一門中無盡重重皆悉亦攝餘異門無盡耶答或俱攝或但攝自無盡何以故若無自一門中無盡餘一切門中無盡皆悉不成故是故初門同體即攝同異二門中無盡無餘乃至十重窮其圓極法界無不攝盡耳或但攝自同體一門中無盡何以故由餘異門如虗空故不相知故自具足故更無可攝此但隨智而取一不差失也如此一門既具足無窮令無盡及相即相入等成無盡者餘一一門中皆悉如是各無盡無盡成宜準知之此且約現事錢中况彼一乘緣起無盡陀羅尼法非謂其法只如此也應可去情如理思之如夜摩天宮精進林菩薩偈云譬如算數法增一至無量數法無體性智慧故差別
